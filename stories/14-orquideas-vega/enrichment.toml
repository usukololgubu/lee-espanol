# ─── Sentences ──────────────────────────────────────────────────────────────

[[sentences]]
text = "Camila revisa el invernadero cada mañana."
tr = "Камила проверяет теплицу каждое утро."

[[sentences]]
text = "Las orquídeas de Vega son pequeñas, blancas, frías."
tr = "Орхидеи Веги маленькие, белые, холодные."

[[sentences]]
text = "La luz artificial cae desde arriba."
tr = "Искусственный свет падает сверху."

[[sentences]]
text = "Las plantas, sin embargo, no miran la luz."
tr = "Растения, однако, не смотрят на свет."

[[sentences]]
text = "Miran las nubes."
tr = "Они смотрят на облака."

[[sentences]]
text = "Camila trabaja en Ciudad-Globo Vega, una estación que flota a cincuenta kilómetros sobre el suelo de Venus."
tr = "Камила работает в «Городе-Шаре Вега» — на станции, которая парит в пятидесяти километрах над поверхностью Венеры."

[[sentences]]
text = "Aquí el aire es casi habitable y la presión es como en la Tierra."
tr = "Здесь воздух почти пригоден для дыхания, а давление — как на Земле."

[[sentences]]
text = "Hay un invernadero pequeño en el módulo cinco."
tr = "В модуле пять есть маленькая теплица."

[[sentences]]
text = "Camila es la única jardinera."
tr = "Камила — единственная садовница."

[[sentences]]
text = "Las flores vinieron de la Tierra hace muchos años."
tr = "Цветы прибыли с Земли много лет назад."

[[sentences]]
text = "Día 91."
tr = "День 91."

[[sentences]]
text = "Las orquídeas se inclinan al este."
tr = "Орхидеи наклоняются на восток."

[[sentences]]
text = "Hay tormenta al este."
tr = "На востоке буря."

[[sentences]]
text = "Posible coincidencia."
tr = "Возможно, совпадение."

[[sentences]]
text = "Día 124."
tr = "День 124."

[[sentences]]
text = "Tormenta al sur."
tr = "Буря на юге."

[[sentences]]
text = "Las flores giran despacio durante toda la mañana."
tr = "Цветы медленно поворачиваются всё утро."

[[sentences]]
text = "No es coincidencia."
tr = "Это не совпадение."

[[sentences]]
text = "Día 187."
tr = "День 187."

[[sentences]]
text = "Cielo limpio."
tr = "Ясное небо."

[[sentences]]
text = "Las plantas miran la luz, obedientes."
tr = "Растения послушно смотрят на свет."

[[sentences]]
text = "Camila ha registrado el efecto durante siete meses."
tr = "Камила фиксирует этот эффект уже семь месяцев."

[[sentences]]
text = "Sus datos son irregulares."
tr = "Её данные неровные."

[[sentences]]
text = "Algunos días olvida medir."
tr = "В некоторые дни она забывает измерять."

[[sentences]]
text = "Otros días la luz parpadea."
tr = "В другие дни мигает свет."

[[sentences]]
text = "La supervisora va a decir que es ruido, que es la imaginación de una técnica aburrida en un invernadero pequeño."
tr = "Начальница скажет, что это шум, что это воображение скучающей сотрудницы в маленькой теплице."

[[sentences]]
text = "— ¿Por qué crees que las plantas sienten la tormenta?"
tr = "— Почему ты думаешь, что растения чувствуют бурю?"

[[sentences]]
text = "— pregunta la supervisora en un mensaje breve."
tr = "— спрашивает начальница в коротком сообщении."

[[sentences]]
text = "— No lo sé."
tr = "— Не знаю."

[[sentences]]
text = "Pero lo hacen."
tr = "Но они это делают."

[[sentences]]
text = "— Mándame los datos."
tr = "— Пришли мне данные."

[[sentences]]
text = "Los datos buenos."
tr = "Хорошие данные."

[[sentences]]
text = "Camila tiene dos cuadernos."
tr = "У Камилы две тетради."

[[sentences]]
text = "En el primero escribe todo: los días claros, los días confusos, los días en que olvida medir."
tr = "В первой она пишет всё: ясные дни, запутанные дни, дни, когда забывает измерить."

[[sentences]]
text = "En el segundo escribe solo los días claros, los días en que el patrón es perfecto."
tr = "Во второй — только ясные дни, дни, когда узор идеален."

[[sentences]]
text = "Si manda el segundo cuaderno, alguien va a estudiar las flores."
tr = "Если она пошлёт вторую тетрадь — кто-то возьмётся изучать цветы."

[[sentences]]
text = "Si manda el primero, nadie va a creerle."
tr = "Если пошлёт первую — никто ей не поверит."

[[sentences]]
text = "Esta noche hay otra tormenta."
tr = "Сегодня ночью снова буря."

[[sentences]]
text = "Las orquídeas se inclinan, calladas, hacia el este."
tr = "Орхидеи молча наклоняются на восток."

[[sentences]]
text = "Camila las mira y todavía no decide qué cuaderno va a abrir mañana."
tr = "Камила смотрит на них и всё ещё не решила, какую тетрадь откроет завтра."
