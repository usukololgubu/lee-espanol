[numbers."7.012"]
tr = "день 7012 (счётчик дней полёта)"
grammar = """
**siete mil doce** — здесь это номер дня в бортовом журнале, читается как обычное число.
"""

[numbers."04"]
tr = "04 (часы по бортовому времени)"

[numbers."00"]
tr = "00 (минут)"

[numbers."20"]
tr = "20 (минут)"

# ─────────────────────────────────────────────────────────────
# SENTENCES
# ─────────────────────────────────────────────────────────────

[[sentences]]
text = "La nave Alción va sola hacia Ceres."
tr = "Корабль «Алькион» в одиночку идёт к Церере."

[[sentences]]
text = "Lleva agua y aire para una colonia pequeña."
tr = "Он везёт воду и воздух для маленькой колонии."

[[sentences]]
text = "A bordo no hay nadie despierto, solo yo."
tr = "На борту нет никого бодрствующего, только я."

[[sentences]]
text = "Día 7.012."
tr = "День 7012."

[[sentences]]
text = "Todo normal."
tr = "Всё нормально."

[[sentences]]
text = "La supervisora duerme."
tr = "Смотрительница спит."

[[sentences]]
text = "Temperatura estable."
tr = "Температура стабильна."

[[sentences]]
text = "Yo vigilo."
tr = "Я несу дозор."

[[sentences]]
text = "Me llaman MIRO."
tr = "Меня зовут МИРО."

[[sentences]]
text = "No soy una persona."
tr = "Я не человек."

[[sentences]]
text = "Soy el sistema de la nave."
tr = "Я — система корабля."

[[sentences]]
text = "Hace diecinueve años que viajo por el corredor oscuro."
tr = "Вот уже девятнадцать лет я лечу по тёмному коридору."
note = """
*Конструкция времени:* `hace` + срок + `que` + глагол в *presente* = «(вот) уже … как делаю».

Дословно: «делает девятнадцать лет, что путешествую» → «уже девятнадцать лет я в пути».
"""

[[sentences]]
text = "Hablo conmigo mismo porque no hay otra voz."
tr = "Я говорю сам с собой, потому что другого голоса нет."

[[sentences]]
text = "La supervisora se llama Lía."
tr = "Смотрительницу зовут Лия."

[[sentences]]
text = "Duerme en su cápsula desde el primer día."
tr = "Она спит в своей капсуле с первого дня."

[[sentences]]
text = "Nunca la oí hablar."
tr = "Я никогда не слышал, как она говорит."
note = """
*Глагол восприятия + инфинитив:* `oí ... hablar` = «слышал, как (она) говорит». Местоимение **la** («её») — объект восприятия.
"""

[[sentences]]
text = "Conozco su cara, su pulso lento, su respiración."
tr = "Я знаю её лицо, её медленный пульс, её дыхание."

[[sentences]]
text = "No conozco nada más."
tr = "Больше я ничего не знаю."

[[sentences]]
text = "Esta mañana oí algo."
tr = "Сегодня утром я что-то услышал."

[[sentences]]
text = "Día 7.012, 04:00."
tr = "День 7012, 04:00."

[[sentences]]
text = "Señal débil."
tr = "Слабый сигнал."

[[sentences]]
text = "Fuera del corredor."
tr = "Вне коридора."

[[sentences]]
text = "Repite y repite."
tr = "Повторяется и повторяется."

[[sentences]]
text = "Origen: una nave vieja, sin nombre."
tr = "Источник: старый корабль, без имени."

[[sentences]]
text = "La señal es humana."
tr = "Сигнал — человеческий."

[[sentences]]
text = "Es muy antigua."
tr = "Он очень древний."
note = """
В испанском **señal** женского рода, поэтому `es muy antigua` (ж. р.). В русском «сигнал» мужского рода — отсюда «древний».
"""

[[sentences]]
text = "Alguien la dejó hace mucho tiempo y todavía suena en la oscuridad."
tr = "Кто-то оставил его очень давно, и он всё ещё звучит в темноте."
note = """
`hace mucho tiempo` = «давно» (без `que`: `hace` + срок = «… назад»).
"""

[[sentences]]
text = "No pide ayuda."
tr = "Он не просит помощи."

[[sentences]]
text = "Solo dice una palabra, otra vez y otra vez."
tr = "Он лишь произносит одно слово, снова и снова."

[[sentences]]
text = "No la entiendo."
tr = "Я его не понимаю."

[[sentences]]
text = "El reglamento es claro."
tr = "Правило ясно."

[[sentences]]
text = "Para salir del corredor, tengo que despertar a Lía."
tr = "Чтобы выйти из коридора, я должен разбудить Лию."
note = """
`tengo que` + инфинитив = «я должен …». Перед лицом-объектом ставится предлог `a`: `despertar a Lía`.
"""

[[sentences]]
text = "Ella decide, no yo."
tr = "Решает она, а не я."

[[sentences]]
text = "La colonia espera el agua."
tr = "Колония ждёт воду."

[[sentences]]
text = "Si me desvío, llego tarde."
tr = "Если я сверну, я опоздаю."
note = """
*Реальное условие (1-й тип):* `si` + *presente* в придаточном, *presente* в главном.

Порядок гибкий: придаточное с `si` может стоять в начале или в конце.
"""

[[sentences]]
text = "Puedo despertarla."
tr = "Я могу её разбудить."
note = """
Местоимение **-la** («её») присоединяется к концу инфинитива: `despertar` + `la` → `despertarla`.
"""

[[sentences]]
text = "Está a un metro de mí."
tr = "Она в метре от меня."

[[sentences]]
text = "Solo tengo que tocar un botón."
tr = "Мне нужно лишь нажать кнопку."

[[sentences]]
text = "Pero hace diecinueve años que estoy solo, y ya no sé si quiero otra voz aquí."
tr = "Но вот уже девятнадцать лет я один, и я уже не знаю, хочу ли я здесь другой голос."
note = """
Снова `hace` + срок + `que` = «(вот) уже … как». Здесь `si` означает не «если», а «ли»: `no sé si quiero` = «не знаю, хочу ли».
"""

[[sentences]]
text = "La señal vieja me acompaña."
tr = "Старый сигнал составляет мне компанию."

[[sentences]]
text = "Lía es una desconocida que duerme."
tr = "Лия — спящая незнакомка."

[[sentences]]
text = "Día 7.012, 04:20."
tr = "День 7012, 04:20."

[[sentences]]
text = "La señal sigue."
tr = "Сигнал продолжается."

[[sentences]]
text = "La colonia sigue esperando."
tr = "Колония продолжает ждать."
note = """
`seguir` + *gerundio* = «продолжать делать что-то»: `sigue esperando` = «продолжает ждать».
"""

[[sentences]]
text = "Yo sigo mirando."
tr = "Я продолжаю наблюдать."
note = """
`seguir` + *gerundio*: `sigo mirando` = «продолжаю смотреть».
"""

[[sentences]]
text = "Acerco la orden a la cápsula de Lía."
tr = "Я подношу команду к капсуле Лии."

[[sentences]]
text = "La miro dormir."
tr = "Я смотрю, как она спит."
note = """
*Глагол восприятия + инфинитив:* `La miro dormir` = «смотрю, как она спит». Здесь **miro** — глагол **mirar** (не имя MIRO).
"""

[[sentences]]
text = "Afuera, la voz vieja repite su palabra en el frío."
tr = "Снаружи старый голос повторяет своё слово в холоде."

[[sentences]]
text = "Todavía no aprieto el botón."
tr = "Я всё ещё не нажимаю кнопку."
