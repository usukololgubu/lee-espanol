[words."vigía"]
tr = "дозорный, наблюдатель"
pos = "сущ."
lemma = "el vigía"
grammar = """
**el vigía** — сущ. *м. р.*, ед. ч.

*Исключение:* оканчивается на `-a`, но мужского рода (как **el día**, **el planeta**). Значит «дозорный», «тот, кто несёт вахту».
"""

