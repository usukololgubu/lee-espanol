**quiero** — *presente*, 1 л. ед. ч., от **querer** («хотеть»).

*Чередование:* `qu[[e]]rer → qu[[ie]]ro` (e → ie).
"""

[words."aquí"]
tr = "здесь, сюда"
pos = "нар."

[words.desconocida]
tr = "незнакомка"
pos = "сущ."
lemma = "el desconocido"

[words."acompaña"]
tr = "(он/она) сопровождает, составляет компанию"
pos = "глаг."
lemma = "acompañar"
grammar = """
**acompaña** — *presente*, 3 л. ед. ч., от **acompañar** («сопровождать, составлять компанию»).

`acompañ·[[ar]]` → `acompañ·[[a]]`
"""

[words.sigue]
tr = "(он/она) продолжает; следует"
pos = "глаг."
lemma = "seguir"
grammar = """
**sigue** — *presente*, 3 л. ед. ч., от **seguir** («продолжать; следовать»).

*Чередование:* `s[[e]]guir → s[[i]]gue` (e → i). `sigue esperando` = «продолжает ждать».
"""

[words.sigo]
tr = "(я) продолжаю"
pos = "глаг."
lemma = "seguir"
grammar = """
**sigo** — *presente*, 1 л. ед. ч., от **seguir**.

*Неправильный в 1 л.:* `s[[i]]go`. `sigo mirando` = «продолжаю смотреть».
"""

[words.esperando]
tr = "ожидая, в ожидании"
pos = "глаг."
lemma = "esperar"
grammar = """
**esperando** — *gerundio* от **esperar** («ждать»).

`esper·[[ando]]`. `sigue esperando` = «продолжает ждать».
"""

[words.mirando]
tr = "смотря, наблюдая"
pos = "глаг."
lemma = "mirar"
grammar = """
**mirando** — *gerundio* от **mirar** («смотреть»).

`mir·[[ando]]`. `sigo mirando` = «продолжаю смотреть».
"""

[words.acerco]
tr = "(я) приближаю, подношу"
pos = "глаг."
lemma = "acercar"
grammar = """
**acerco** — *presente*, 1 л. ед. ч., от **acercar** («приближать, подносить»).

`acerc·[[ar]]` → `acerc·[[o]]`
"""

[words.orden]
tr = "приказ, команда"
pos = "сущ."
lemma = "la orden"
grammar = """
**la orden** — сущ. *ж. р.*, здесь «приказ, команда». (Ср. **el orden** «порядок» — другое значение и род.)
"""

[words.dormir]
tr = "спать"
pos = "глаг."
lemma = "dormir"
grammar = """
**dormir** — *infinitivo* («спать»). `La miro dormir` = «Я смотрю, как она спит».
"""

[words.afuera]
tr = "снаружи, наружу"
pos = "нар."

[words."frío"]
tr = "холод; холодный"
pos = "сущ."
lemma = "el frío"

[words.aprieto]
tr = "(я) нажимаю, жму"
pos = "глаг."
lemma = "apretar"
grammar = """
**aprieto** — *presente*, 1 л. ед. ч., от **apretar** («нажимать, жать»).

*Чередование:* `apr[[e]]tar → apr[[ie]]to` (e → ie).
"""

