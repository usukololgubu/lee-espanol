# ──────── Sentences (in document order — 36 total) ────────

[[sentences]]
text = "Mariela trabaja sola en la Estación Casiopea, sobre la superficie helada de Plutón."
tr = "Мариэла работает одна на станции Касиопея, на ледяной поверхности Плутона."

[[sentences]]
text = "La estación es pequeña: una sala con tres pantallas, un sillón viejo y una ventana negra."
tr = "Станция маленькая: комната с тремя экранами, старое кресло и чёрное окно."

[[sentences]]
text = "Afuera no hay nada — solo polvo, hielo y silencio."
tr = "Снаружи ничего нет — только пыль, лёд и тишина."

[[sentences]]
text = "Su turno empieza a las dos de la mañana."
tr = "Её смена начинается в два часа ночи."
note = """
Время с предлогом `a`: `a las dos` — «в два часа». `de la mañana` = «утра/ночи».

**empieza** от **empezar** («начинать»), чередование `e → ie`.
"""

[[sentences]]
text = "La radio escucha el cielo lejano, más allá del sistema solar."
tr = "Радио слушает далёкое небо, за пределами Солнечной системы."

[[sentences]]
text = "Casi siempre el cielo está vacío."
tr = "Почти всегда небо пустое."

[[sentences]]
text = "Casi siempre Mariela toma café y lee viejos artículos."
tr = "Почти всегда Мариэла пьёт кофе и читает старые статьи."

[[sentences]]
text = "Pero esta noche la pantalla muestra una línea extraña."
tr = "Но этой ночью экран показывает странную линию."

[[sentences]]
text = "Una señal muy débil."
tr = "Очень слабый сигнал."

[[sentences]]
text = "Sube despacio, baja despacio."
tr = "Медленно поднимается, медленно опускается."

[[sentences]]
text = "Después de cincuenta y ocho minutos, vuelve."
tr = "Через пятьдесят восемь минут возвращается."

[[sentences]]
text = "La misma forma, la misma duración."
tr = "Та же форма, та же длительность."

[[sentences]]
text = "Tres veces ya."
tr = "Уже три раза."

[[sentences]]
text = "Mariela revisa los filtros."
tr = "Мариэла проверяет фильтры."

[[sentences]]
text = "No es un error del receptor."
tr = "Это не ошибка приёмника."

[[sentences]]
text = "Busca en el catálogo."
tr = "Ищет в каталоге."

[[sentences]]
text = "No es un púlsar conocido."
tr = "Это не известный пульсар."

[[sentences]]
text = "No es un satélite."
tr = "Это не спутник."

[[sentences]]
text = "No coincide con nada conocido por la humanidad."
tr = "Не совпадает ни с чем, известным человечеству."

[[sentences]]
text = "El protocolo es claro: «señales no identificadas, reporte inmediato a la Tierra»."
tr = "Протокол ясен: «неидентифицированные сигналы — немедленный отчёт на Землю»."

[[sentences]]
text = "Si ella reporta ahora, mañana van a llegar las preguntas."
tr = "Если она сообщит сейчас, завтра придут вопросы."

[[sentences]]
text = "Después los equipos."
tr = "Потом команды."

[[sentences]]
text = "Después los nombres famosos, los institutos, los periodistas."
tr = "Потом — известные имена, институты, журналисты."

[[sentences]]
text = "La señal va a ser de todos, y de nadie."
tr = "Сигнал будет принадлежать всем — и никому."

[[sentences]]
text = "Mariela mira la pantalla otra vez."
tr = "Мариэла снова смотрит на экран."

[[sentences]]
text = "La señal pulsa, tranquila, paciente."
tr = "Сигнал пульсирует — спокойный, терпеливый."

[[sentences]]
text = "Lleva mucho tiempo viajando — millones de años, tal vez."
tr = "Он путешествует уже долго — может быть, миллионы лет."
note = """
`llevar` + срок + *герундий* = «уже долго (делает)»: `lleva mucho tiempo viajando` — «путешествует уже долго».
"""

[[sentences]]
text = "No tiene prisa."
tr = "Он не торопится."

[[sentences]]
text = "Ella escribe en el registro: «anomalía no clasificada, en estudio»."
tr = "Она пишет в журнале: «неклассифицированная аномалия, изучается»."

[[sentences]]
text = "Cierra el formulario sin enviarlo."
tr = "Закрывает форму, не отправляя её."
note = """
`sin` + инфинитив = «не (делая)»: `sin enviarlo` — «не отправляя его».

Местоимение **lo** присоединяется к инфинитиву: `enviar` + `lo` → **enviarlo**.
"""

[[sentences]]
text = "Después prepara otro café."
tr = "Потом готовит ещё один кофе."

[[sentences]]
text = "Se sienta."
tr = "Садится."

[[sentences]]
text = "El cielo sigue cantando bajo la estática, lento, lejano."
tr = "Небо продолжает петь под помехами — медленно, далеко."

[[sentences]]
text = "Pronto la señal va a volver."
tr = "Скоро сигнал вернётся."

[[sentences]]
text = "Mariela quiere escucharla una vez más, sola."
tr = "Мариэла хочет услышать его ещё раз, в одиночестве."

[[sentences]]
text = "Después, va a hablar."
tr = "Потом расскажет."
