# ──────── Verbs (conjugated forms) ────────

[words.trabaja]
tr = "(она) работает"
pos = "глаг."
lemma = "trabajar"
grammar = """
**trabaja** — *presente*, 3 л. ед. ч., от **trabajar** ("работать").

Правильный глагол на `-ar`: `trabaj·[[ar]]` → `trabaj·[[a]]`.
"""

[words.es]
tr = "(он/она) есть"
pos = "глаг."
lemma = "ser"
grammar = """
**es** — *presente*, 3 л. ед. ч., от **ser** ("быть").

*Неправильный.* Спряж.: `soy · eres · es · somos · sois · son`.

**ser** vs **estar**: **ser** для постоянных/сущностных свойств (`la estación [[es]] pequeña`).
"""

[words."está"]
tr = "(он/она) находится"
pos = "глаг."
lemma = "estar"
grammar = """
**está** — *presente*, 3 л. ед. ч., от **estar** ("быть, находиться в состоянии").

*Неправильный* + графическое ударение. Спряж.: `estoy · estás · está · estamos · estáis · están`.

**estar** для временных состояний: `el cielo [[está]] vacío` ("небо пустое в данный момент").
"""

[words.hay]
tr = "есть; имеется"
pos = "глаг."
lemma = "haber"
grammar = """
**hay** — безличная форма от **haber**: "есть (в наличии)", "имеется".

Не меняется по числу: `[[hay]] una sala` / `[[hay]] tres sillones`.

В тексте: `no [[hay]] nada` ("ничего нет").
"""

[words.empieza]
tr = "(она) начинается"
pos = "глаг."
lemma = "empezar"
grammar = """
**empieza** — *presente*, 3 л. ед. ч., от **empezar** ("начинать(ся)").

*Чередование в корне:* `emp[[e]]zar → emp[[ie]]za` (e → ie под ударением).
"""

[words.escucha]
tr = "(она/оно) слушает"
pos = "глаг."
lemma = "escuchar"
grammar = """
**escucha** — *presente*, 3 л. ед. ч., от **escuchar** ("слушать").

Правильный на `-ar`: `escuch·[[ar]]` → `escuch·[[a]]`.
"""

[words.toma]
tr = "(она) пьёт / берёт"
pos = "глаг."
lemma = "tomar"
grammar = """
**toma** — *presente*, 3 л. ед. ч., от **tomar** ("брать; пить").

`tomar café` = "пить кофе".
"""

[words.lee]
tr = "(она) читает"
pos = "глаг."
lemma = "leer"
grammar = """
**lee** — *presente*, 3 л. ед. ч., от **leer** ("читать").

Глагол на `-er`: `le·[[er]]` → `le·[[e]]`.
"""

[words.muestra]
tr = "(он/она) показывает"
pos = "глаг."
lemma = "mostrar"
grammar = """
**muestra** — *presente*, 3 л. ед. ч., от **mostrar** ("показывать").

*Чередование:* `m[[o]]strar → m[[ue]]stra` (o → ue под ударением).
"""

[words.sube]
tr = "(она/оно) поднимается"
pos = "глаг."
lemma = "subir"
grammar = """
**sube** — *presente*, 3 л. ед. ч., от **subir** ("подниматься").

Глагол на `-ir`: `sub·[[ir]]` → `sub·[[e]]`.
"""

[words.baja]
tr = "(она/оно) опускается"
pos = "глаг."
lemma = "bajar"
grammar = """
**baja** — *presente*, 3 л. ед. ч., от **bajar** ("опускаться").

Правильный на `-ar`.
"""

[words.vuelve]
tr = "(он/она) возвращается"
pos = "глаг."
lemma = "volver"
grammar = """
**vuelve** — *presente*, 3 л. ед. ч., от **volver** ("возвращаться").

*Чередование:* `v[[o]]lver → v[[ue]]lve` (o → ue).
"""

[words.revisa]
tr = "(она) проверяет"
pos = "глаг."
lemma = "revisar"
grammar = """
**revisa** — *presente*, 3 л. ед. ч., от **revisar** ("проверять").
"""

[words.busca]
tr = "(она) ищет"
pos = "глаг."
lemma = "buscar"
grammar = """
**busca** — *presente*, 3 л. ед. ч., от **buscar** ("искать").

В отличие от русского, **buscar** не требует предлога: `[[busca]] en el catálogo`.
"""

[words.coincide]
tr = "(он/она) совпадает"
pos = "глаг."
lemma = "coincidir"
grammar = """
**coincide** — *presente*, 3 л. ед. ч., от **coincidir** ("совпадать").

Глагол на `-ir`, правильный.
"""

[words.reporta]
tr = "(она) сообщает"
pos = "глаг."
lemma = "reportar"
grammar = """
**reporta** — *presente*, 3 л. ед. ч., от **reportar** ("докладывать, сообщать").

В условии с **si**: `si ella [[reporta]] ahora` = "если она сообщит сейчас" (рус. буд., исп. наст.).
"""

[words.van]
tr = "(они) идут; собираются"
pos = "глаг."
lemma = "ir"
grammar = """
**van** — *presente*, 3 л. мн. ч., от **ir** ("идти").

В тексте — часть *futuro próximo*: **van a llegar** ("придут / собираются прийти").

Структура: `[[ir]]` (в наст. вр.) + `a` + инфинитив.
"""

[words.llegar]
tr = "прибывать"
pos = "глаг."
lemma = "llegar"
grammar = """
**llegar** — инфинитив, "прибывать, приходить".

В составе *futuro próximo*: **van a llegar**.
"""

[words.va]
tr = "(он/она) идёт; собирается"
pos = "глаг."
lemma = "ir"
grammar = """
**va** — *presente*, 3 л. ед. ч., от **ir**.

*Неправильный.* Спряж.: `voy · vas · va · vamos · vais · van`.

В тексте — часть *futuro próximo* три раза: **va a ser**, **va a volver**, **va a hablar** ("будет / собирается …").
"""

[words.ser]
tr = "быть"
pos = "глаг."
lemma = "ser"
grammar = """
**ser** — инфинитив "быть".

В тексте — в *futuro próximo*: **va a ser** ("будет").
"""

[words.volver]
tr = "возвращаться"
pos = "глаг."
lemma = "volver"
grammar = """
**volver** — инфинитив "возвращаться".

В тексте — в *futuro próximo*: **va a volver** ("вернётся").
"""

[words.hablar]
tr = "говорить"
pos = "глаг."
lemma = "hablar"
grammar = """
**hablar** — инфинитив "говорить".

В тексте — в *futuro próximo*: **va a hablar** ("заговорит, расскажет").
"""

[words.mira]
tr = "(она) смотрит"
pos = "глаг."
lemma = "mirar"
grammar = """
**mira** — *presente*, 3 л. ед. ч., от **mirar** ("смотреть").

Правильный на `-ar`. **mirar** ≠ **ver**: **mirar** — намеренно смотреть.
"""

[words.pulsa]
tr = "(он/она) пульсирует"
pos = "глаг."
lemma = "pulsar"
grammar = """
**pulsa** — *presente*, 3 л. ед. ч., от **pulsar** ("пульсировать; нажимать").

Не путать с сущ. **púlsar** ("пульсар", астроном.) — см. **púlsar**.
"""

[words.lleva]
tr = "(он/она) несёт; проводит (время)"
pos = "глаг."
lemma = "llevar"
grammar = """
**lleva** — *presente*, 3 л. ед. ч., от **llevar**.

Идиома `[[llevar]] + время + герундий` — "делает что-л. уже …": `[[lleva]] mucho tiempo viajando` = "путешествует уже долго".
"""

[words.tiene]
tr = "(он/она) имеет"
pos = "глаг."
lemma = "tener"
grammar = """
**tiene** — *presente*, 3 л. ед. ч., от **tener** ("иметь").

*Неправильный + чередование:* `t[[e]]ner → t[[ie]]ne`. Спряж.: `tengo · tienes · tiene · tenemos · tenéis · tienen`.

Идиома `tener prisa` = "торопиться" (букв. "иметь спешку").
"""

[words.escribe]
tr = "(она) пишет"
pos = "глаг."
lemma = "escribir"
grammar = """
**escribe** — *presente*, 3 л. ед. ч., от **escribir** ("писать").

Глагол на `-ir`, правильный в этой форме.
"""

[words.cierra]
tr = "(она) закрывает"
pos = "глаг."
lemma = "cerrar"
grammar = """
**cierra** — *presente*, 3 л. ед. ч., от **cerrar** ("закрывать").

*Чередование:* `c[[e]]rrar → c[[ie]]rra` (e → ie).
"""

[words.enviarlo]
tr = "отправить его"
pos = "глаг."
lemma = "enviar"
grammar = """
**enviarlo** — инфинитив **enviar** ("отправлять") + местоимение-объект **lo** ("его"), приклеенное к концу.

`enviar` + `[[lo]]` → `enviar[[lo]]`. Безударный объект всегда сливается с инфинитивом.
"""

[words.prepara]
tr = "(она) готовит"
pos = "глаг."
lemma = "preparar"
grammar = """
**prepara** — *presente*, 3 л. ед. ч., от **preparar** ("готовить").
"""

[words.sienta]
tr = "(она) садится"
pos = "глаг."
lemma = "sentarse"
grammar = """
**se sienta** — *presente* возвратного глагола **sentarse** ("садиться"), 3 л. ед. ч.

*Чередование:* `s[[e]]ntarse → se s[[ie]]nta` (e → ie).

Частица **se** показывает, что субъект действует "на себя" ("садится сам").
"""

[words.se]
tr = "себя; (возвр. частица)"
pos = "мест."
lemma = "se"
grammar = """
**se** — возвратное местоимение 3 л.

В тексте: **se sienta** ("садится") — частица показывает возвратность.
"""

[words.sigue]
tr = "(он/она) продолжает"
pos = "глаг."
lemma = "seguir"
grammar = """
**sigue** — *presente*, 3 л. ед. ч., от **seguir** ("следовать; продолжать").

*Чередование:* `s[[e]]guir → s[[i]]gue` (e → i).

Конструкция `[[seguir]] + герундий` = "продолжать (делать)": `sigue [[cantando]]` ("продолжает петь").
"""

[words.cantando]
tr = "поя (герундий)"
pos = "глаг."
lemma = "cantar"
grammar = """
**cantando** — *герундий* от **cantar** ("петь").

`cant·[[ar]]` → `cant·[[ando]]`. У глаголов на `-ar` герундий заканчивается на `-ando`, у `-er/-ir` — на `-iendo`.
"""

[words.viajando]
tr = "путешествуя (герундий)"
pos = "глаг."
lemma = "viajar"
grammar = """
**viajando** — *герундий* от **viajar** ("путешествовать"): `viaj·[[ar]]` → `viaj·[[ando]]`.

Часть конструкции `lleva mucho tiempo [[viajando]]` ("путешествует уже долго").
"""

[words.quiere]
tr = "(она) хочет"
pos = "глаг."
lemma = "querer"
grammar = """
**quiere** — *presente*, 3 л. ед. ч., от **querer** ("хотеть").

*Чередование:* `qu[[e]]rer → qu[[ie]]re` (e → ie).
"""

[words.escucharla]
tr = "слушать его / её"
pos = "глаг."
lemma = "escuchar"
grammar = """
**escucharla** — инфинитив **escuchar** + местоимение **la** ("её", указывает на **la señal**).

`escuchar` + `[[la]]` → `escuchar[[la]]`. Безударное местоимение сливается с инфинитивом.
"""

