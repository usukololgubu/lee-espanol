# Story 09 — "La señal" — enrichment for renderer popups
# Each [words.<form>] entry feeds a hover popup.
# Each [[sentences]] entry maps to a sentence-terminator in document order.

# ──────── Proper nouns (no lemma → no SpanishDict link) ────────

[words.mariela]
tr = "Мариэла — имя радиоастронома"
pos = "имя"

