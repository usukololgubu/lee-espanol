"""

# ──────── Prepositions / conjunctions / common particles ────────

[words.a]
tr = "в; к; на"
pos = "предл."
lemma = "a"
grammar = """
**a** — многозначный предлог.

Здесь: указание времени (`a las dos`), направления (`a la Tierra`), и составная часть *futuro próximo*: **ir a + инфинитив** (**va a ser**, **va a volver**).
"""

[words.de]
tr = "из; от; о; (родительный)"
pos = "предл."
lemma = "de"

[words.del]
tr = "из / от + (м. р. ед. ч.)"
pos = "предл."
lemma = "del"
grammar = """
**del** — слияние `de + el`.

`de + [[el]]` → `[[del]]`. Артикль **el** не пишется отдельно.
"""

[words.en]
tr = "в; на"
pos = "предл."
lemma = "en"

[words.con]
