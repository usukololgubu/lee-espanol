tr = "имеет, у неё есть"
pos = "глаг."
lemma = "tener"
grammar = """
**tiene** — *presente* от **tener** ("иметь"), 3 л. ед. ч.

*Чередование в корне:* `t[[e]]ner → t[[ie]]ne` (e → ie под ударением). И 1 л. — особый: `yo tengo`.

Спряжение: `tengo · tienes · tiene · tenemos · tenéis · tienen`.
"""

[words."tienen"]
tr = "(они) имеют, у них есть"
pos = "глаг."
lemma = "tener"
grammar = """
**tienen** — *presente* от **tener** ("иметь"), 3 л. мн. ч.

*Чередование:* `t[[e]]ner → t[[ie]]nen` (e → ie). 1 л.: `yo tengo`.

Спряжение: `tengo · tienes · tiene · tenemos · tenéis · tienen`.
"""

[words."tierra"]
tr = "Земля (планета)"
pos = "имя"
# no lemma → no SpanishDict link

[words."toca"]
tr = "(она) трогает"
pos = "глаг."
lemma = "tocar"
grammar = """
**toca** — *presente* от **tocar** ("трогать, касаться"), 3 л. ед. ч.

Правильный глагол на `-ar`: `toc·[[ar]]` → `toc·[[a]]`.
"""

[words."todo"]
tr = "всё"
pos = "мест."
lemma = "todo"

[words."todos"]
tr = "все"
pos = "мест."
lemma = "todo"

[words."trae"]
tr = "приносит, приводит"
pos = "глаг."
lemma = "traer"
grammar = """
**trae** — *presente* от **traer** ("приносить, приводить"), 3 л. ед. ч.

*Неправильный в 1 л.:* `yo traigo`. В 3 л. — правильный: `tra·[[e]]`.
"""

[words."un"]
tr = "один; неопр. артикль м.р."
pos = "арт."
lemma = "un"

[words."una"]
tr = "одна; неопр. артикль ж.р."
pos = "арт."
lemma = "una"

[words."va"]
tr = "(он/она) идёт / собирается"
pos = "глаг."
lemma = "ir"
grammar = """
**va** — *presente* от **ir** ("идти"), 3 л. ед. ч.

*Очень неправильный.* Спряжение: `voy · vas · va · vamos · vais · van`.

*В конструкции* **va a + инф.** = *futuro próximo* ("собирается X", близкое будущее). Здесь **va** — маркёр будущего, а не "идёт".

Пример: `va a volver` = "вернётся (в скором времени)".
"""

[words."van"]
tr = "(они) идут / собираются"
pos = "глаг."
lemma = "ir"
grammar = """
**van** — *presente* от **ir** ("идти"), 3 л. мн. ч.

*В конструкции* **van a + инф.** = *futuro próximo* (мн. ч.): "(они) собираются X".

Пример: `van a saber` = "узнают (скоро)".

Полное спряжение: `voy · vas · va · vamos · vais · van`.
"""

[words."velas"]
tr = "свечи"
pos = "сущ."
lemma = "la vela"

[words."venir"]
tr = "приходить, прибывать (инф.)"
pos = "глаг."
lemma = "venir"

[words."ver"]
tr = "видеть (инф.)"
pos = "глаг."
lemma = "ver"

[words."vino"]
tr = "(она) пришла, прибыла"
pos = "глаг."
lemma = "venir"
grammar = """
**vino** — *pretérito indefinido* от **venir** ("прийти"), 3 л. ед. ч.

*Неправильный.* Корень меняется на [[vin-]]. Спряжение: `vine · viniste · vino · vinimos · vinisteis · vinieron`.

(Не путать с существительным **el vino** "вино" — омоним.)
"""

[words."vive"]
tr = "живёт"
pos = "глаг."
lemma = "vivir"
grammar = """
**vive** — *presente* от **vivir** ("жить"), 3 л. ед. ч.

Правильный глагол на `-ir`: `viv·[[ir]]` → `viv·[[e]]`.
"""

[words."volver"]
tr = "вернуться (инф.)"
pos = "глаг."
lemma = "volver"

[words."y"]
tr = "и"
pos = "союз"
lemma = "y"

# ============================================================
# Sentences — ordered by appearance, one per terminator
# ============================================================

[[sentences]]
text = "Elena escribe en su cuaderno: \"Día 78.\""
tr = "Elena пишет в своей тетради: «День 78»."

[[sentences]]
text = "La plaza está llena de gente."
tr = "Площадь полна людей."

[[sentences]]
text = "Es el día del Patrón."
tr = "Это день Покровителя."

[[sentences]]
text = "Todos miran al cielo."
tr = "Все смотрят на небо."

[[sentences]]
text = "Esperan ver al santo."
tr = "Они ждут, чтобы увидеть святого."

[[sentences]]
text = "Algunos rezan."
tr = "Некоторые молятся."

[[sentences]]
text = "Otros lloran."
tr = "Другие плачут."

[[sentences]]
text = "Elena no es de aquí."
tr = "Elena — не отсюда."

[[sentences]]
text = "Vino de la Tierra hace seis meses."
tr = "Она прибыла с Земли шесть месяцев назад."

[[sentences]]
text = "Es antropóloga."
tr = "Она антрополог."

[[sentences]]
text = "Observa, escribe, no interviene."
tr = "Она наблюдает, пишет, не вмешивается."

[[sentences]]
text = "La gente de Nueva Andalucía no recuerda la Tierra."
tr = "Жители Новой Андалусии не помнят Землю."

[[sentences]]
text = "Hace ochenta años, las naves dejaron de venir."
tr = "Восемьдесят лет назад корабли перестали прилетать."

[[sentences]]
text = "La radio se apagó."
tr = "Радио замолчало."

[[sentences]]
text = "La gente se quedó sola."
tr = "Люди остались одни."

[[sentences]]
text = "Los hijos de los hijos no saben qué es la Tierra."
tr = "Дети детей не знают, что такое Земля."

[[sentences]]
text = "Ahora tienen un santo nuevo."
tr = "Теперь у них есть новый святой."

[[sentences]]
text = "Es Saturno, el Patrón."
tr = "Это Сатурн, Покровитель."

[[sentences]]
text = "Dicen que vive en el cielo, dentro de un anillo de oro."
tr = "Говорят, что он живёт в небе, внутри золотого кольца."

[[sentences]]
text = "Dicen que los mira siempre."
tr = "Говорят, что он всегда смотрит на них."

[[sentences]]
text = "Dicen que un día va a volver y va a juzgar a todos."
tr = "Говорят, что однажды он вернётся и будет судить всех."

[[sentences]]
text = "Elena sabe que Saturno es un planeta."
tr = "Elena знает, что Сатурн — это планета."

[[sentences]]
text = "Tiene anillos, sí, pero no de oro."
tr = "У него есть кольца, да, но не из золота."

[[sentences]]
text = "Es solo gas y hielo."
tr = "Это только газ и лёд."

[[sentences]]
text = "Nadie vive allí."
tr = "Там никто не живёт."

[[sentences]]
text = "Pero ella no dice nada."
tr = "Но она ничего не говорит."

[[sentences]]
text = "Escribe."
tr = "Пишет."

[[sentences]]
text = "El humo de las velas sube despacio."
tr = "Дым свечей медленно поднимается."

[[sentences]]
text = "Una niña pequeña le toca la mano a Elena."
tr = "Маленькая девочка трогает руку Elena."

[[sentences]]
text = "La niña tiene fiebre."
tr = "У девочки температура."

[[sentences]]
text = "Su madre la trae al santo."
tr = "Мать привела её к святому."

[[sentences]]
text = "Quiere ayuda."
tr = "Хочет помощи."

[[sentences]]
text = "Elena tiene medicina en su bolsa."
tr = "У Elena есть лекарство в сумке."

[[sentences]]
text = "Una pastilla."
tr = "Одна таблетка."

[[sentences]]
text = "La niña va a estar bien en una hora."
tr = "Девочке станет лучше через час."

[[sentences]]
text = "Pero si Elena le da la pastilla, todos van a saber."
tr = "Но если Elena даст ей таблетку, все узнают."

[[sentences]]
text = "Van a preguntar."
tr = "Будут спрашивать."

[[sentences]]
text = "Van a querer más."
tr = "Захотят ещё."

[[sentences]]
text = "Van a entender que ella no es de aquí."
tr = "Поймут, что она не отсюда."

[[sentences]]
text = "La cultura va a cambiar."
tr = "Культура изменится."

[[sentences]]
text = "Quizás se rompe."
tr = "Может быть, разрушится."

[[sentences]]
text = "Y si no le da la pastilla, la niña va a sufrir."
tr = "А если не даст таблетку — девочка будет страдать."

[[sentences]]
text = "Quizás más."
tr = "Может быть, сильнее."

[[sentences]]
text = "La madre reza."
tr = "Мать молится."

[[sentences]]
text = "La niña tiembla."
tr = "Девочка дрожит."

[[sentences]]
text = "Elena toca la pastilla en su bolsillo."
tr = "Elena трогает таблетку в кармане."

[[sentences]]
text = "Mira al cielo."
tr = "Смотрит на небо."

[[sentences]]
text = "El sol cae sobre la plaza."
tr = "Солнце падает на площадь."

[[sentences]]
text = "Escribe: \"Hoy decido.\""
tr = "Она пишет: «Сегодня я решаю»."

[[sentences]]
text = "No escribe qué."
tr = "Она не пишет что."
