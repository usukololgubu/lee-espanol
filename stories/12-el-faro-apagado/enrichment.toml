[words.tal]
tr = "такой; такая"
pos = "прил."
lemma = "tal"
grammar = """
**tal** — здесь в устойчивом обороте `tal vez` = "может быть, возможно". Берёт *presente* (без *subjuntivo*) на уровне A1.
"""

[words.nadie]
tr = "никто"
pos = "мест."
lemma = "nadie"
grammar = """
**nadie** — "никто". Когда стоит перед глаголом, **no** не нужно: `[[Nadie]] responde` ("никто не отвечает").
"""

