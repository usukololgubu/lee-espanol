grammar = """
**envía** — *presente*, 3 л. ед. ч., от **enviar** ("отправлять, посылать").

Графическое ударение на `í`: `env·í·a`. Правильный на `-ar`.

`la antena [[envía]] la señal` ("антенна отправляет сигнал").
"""

[words."abrió"]
tr = "(он/она) открылся"
pos = "глаг."
lemma = "abrir"
grammar = """
**abrió** — *pretérito indefinido*, 3 л. ед. ч., от **abrir** ("открывать(ся)").

`abr·[[ir]]` → `abr·[[ió]]` (правильный на `-ir`).

`el corredor nuevo [[abrió]]` = "новый коридор открылся".
"""

[words.pasaron]
tr = "(они) прошли; перешли"
pos = "глаг."
lemma = "pasar"
grammar = """
**pasaron** — *pretérito indefinido*, 3 л. мн. ч., от **pasar** ("проходить, переходить").

`pas·[[ar]]` → `pas·[[aron]]`.
