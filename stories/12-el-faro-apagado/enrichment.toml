pos = "глаг."
lemma = "ser"
grammar = """
**es** — *presente*, 3 л. ед. ч., от **ser** ("быть" — постоянные свойства).

`El faro [[es]] una pequeña roca` ("Маяк — это маленькая скала").
"""

[words.vive]
tr = "(он/она) живёт"
pos = "глаг."
lemma = "vivir"
grammar = """
**vive** — *presente*, 3 л. ед. ч., от **vivir** ("жить"). Правильный на `-ir`.

`viv·[[ir]]` → `viv·[[e]]`.
"""

[words.tiene]
tr = "(он/она) имеет"
pos = "глаг."
lemma = "tener"
grammar = """
**tiene** — *presente*, 3 л. ед. ч., от **tener** ("иметь").

Неправильный с чередованием `t[[e]]ner → t[[ie]]ne` (e → ie).

Спряж.: `tengo · tienes · tiene · tenemos · tenéis · tienen`.

`Renata [[tiene]] cuarenta y dos años` = "Ренате сорок два года" (бук. "Рената имеет сорок два года").
"""

[words."envía"]
