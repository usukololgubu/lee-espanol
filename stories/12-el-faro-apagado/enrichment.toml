**volvió** — *pretérito indefinido*, 3 л. ед. ч., от **volver** ("возвращаться").

`volv·[[er]]` → `volv·[[ió]]`. В *pretérito* без чередования.

`[[Nadie]] [[volvió]] por el viejo` = "Никто не вернулся по старому (коридору)".
