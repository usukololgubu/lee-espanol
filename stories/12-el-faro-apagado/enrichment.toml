tr = "эта"
pos = "мест."
lemma = "este"
grammar = """
**esta** — указательное местоимение ж. р. ед. ч. от **este**.

`[[esta]] señal` ("этот сигнал" — **señal** ж. р. в исп.).
"""

[words.misma]
tr = "та же самая"
pos = "прил."
lemma = "mismo"
grammar = """
**misma** — ж. р. ед. ч. от **mismo** ("сам, такой же"). Согласуется с **señal** (ж.).

`la [[misma]] señal` = "тот же самый сигнал".
"""

[words.otra]
tr = "другая; ещё одна"
pos = "прил."
lemma = "otro"
grammar = """
**otra** — ж. р. ед. ч. от **otro**. Согласуется с **vez** (ж.).

