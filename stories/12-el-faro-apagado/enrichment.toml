# Story 12 — "El faro apagado" — enrichment for renderer popups
# 40 sentence-terminators across 11 paragraphs + a transmission blockquote and a heading.

# ──────── Proper nouns (no lemma → no SpanishDict link) ────────

[words.renata]
tr = "Рената — имя главной героини, смотрительницы маяка"
pos = "имя"

[words."vesta-7"]
tr = "Веста-7 — позывной маяка-ретранслятора на астероиде в старом коридоре между Церерой и Юпитером"
pos = "имя"

[words.ceres]
tr = "Церера — карликовая планета в поясе астероидов"
pos = "имя"

[words."júpiter"]
tr = "Юпитер — планета"
pos = "имя"

[words.marte]
tr = "Марс — планета"
pos = "имя"

[words.tierra]
tr = "Земля — планета (в тексте всегда с большой буквы и арт. **la**)"
pos = "имя"

