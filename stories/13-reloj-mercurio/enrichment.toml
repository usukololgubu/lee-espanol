pos = "глаг."
lemma = "estar"
grammar = """
**está** — *presente indicativo*, 3 л. ед. ч., от **estar** («быть/находиться»).

Неправильный. Спряж.: `estoy · estás · está · estamos · estáis · están`.

`est·[[á]]` — ударение на последний слог фиксируется на письме.
"""

