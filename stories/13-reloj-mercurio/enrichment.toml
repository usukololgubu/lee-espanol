**quema** — *presente*, 3 л. ед. ч., от **quemar** («жечь»).

`quem·[[ar]]` → `quem·[[a]]`. Сравни с возвратной формой **quemarse** («сгорать»).
"""

[words.tiene]
tr = "(он/она) имеет, у (неё/него) есть"
pos = "глаг."
lemma = "tener"
grammar = """
**tiene** — *presente*, 3 л. ед. ч., от **tener** («иметь»). Неправильный.

*Чередование* `e → ie`: `t[[e]]ner → t[[ie]]ne`.

Спряж.: `tengo · tienes · tiene · tenemos · tenéis · tienen`.

Часто переводится как «у кого-то есть»: `la colonia tiene niños` = «в колонии есть дети».
"""

[words."niños"]
tr = "дети"
pos = "сущ."
lemma = "el niño"

[words.eso]
tr = "это"
pos = "мест."
lemma = "eso"

[words.lo]
tr = "это (мест. прямого дополнения, ср. р.)"
pos = "мест."
lemma = "lo"
grammar = """
**lo** — мест. прямого дополнения ср. р., ед. ч.

«*eso lo sabe*» = «это она знает» — `lo` указывает на абстрактное «это».
"""

[words.los]
tr = "(арт. м. р., мн. ч.); их"
pos = "арт."
lemma = "el / los"
grammar = """
**los** здесь — мест. прямого дополнения м. р., мн. ч. («их»).

«*los conoce*» = «(она) их знает». То же написание имеет арт. мн. ч.: `los niños`.
"""

[words.conoce]
tr = "(она) знает (лично, знакома с)"
pos = "глаг."
lemma = "conocer"
grammar = """
**conoce** — *presente*, 3 л. ед. ч., от **conocer** («знать, быть знакомым»). 1 л. неправильное: `conozco`.

Разница с **saber**: **conocer** = знать человека/место (быть знакомым), **saber** = знать факт/уметь.
"""

[words.casi]
tr = "почти"
pos = "нар."
lemma = "casi"

[words.todos]
tr = "все"
pos = "опр."
lemma = "todo"

[words.nombre]
tr = "имя"
pos = "сущ."
lemma = "el nombre"

[words."única"]
tr = "единственная"
pos = "прил."
lemma = "único"
grammar = """
**única** — прил. *ж. р., ед. ч.* от **único** («единственный»).

В позиции перед существительным имеет значение «единственная»: `la única cosa` = «единственная вещь».
"""

[words.cosa]
tr = "вещь"
pos = "сущ."
lemma = "la cosa"

[words.ellos]
tr = "они (м. р.)"
pos = "мест."
lemma = "ellos"

[words.pone]
tr = "(она) кладёт, ставит"
pos = "глаг."
lemma = "poner"
grammar = """
**pone** — *presente*, 3 л. ед. ч., от **poner** («класть, ставить»). 1 л. неправильное: `pongo`.

Спряж.: `pongo · pones · pone · ponemos · ponéis · ponen`.
"""

[words.dedos]
tr = "пальцы"
pos = "сущ."
lemma = "el dedo"

[words.sobre]
tr = "на, над"
pos = "предл."
lemma = "sobre"

[words."botón"]
tr = "кнопка"
pos = "сущ."
lemma = "el botón"

[words.aprieta]
tr = "(она) нажимает, сжимает"
pos = "глаг."
lemma = "apretar"
grammar = """
**aprieta** — *presente*, 3 л. ед. ч., от **apretar** («сжимать, нажимать»).

*Чередование* `e → ie`: `apr[[e]]tar → apr[[ie]]ta`.
"""

[words."todavía"]
tr = "ещё"
pos = "нар."
lemma = "todavía"

[words.espera]
tr = "(она) ждёт"
pos = "глаг."
lemma = "esperar"
grammar = """
**espera** — *presente*, 3 л. ед. ч., от **esperar** («ждать»).

`esper·[[ar]]` → `esper·[[a]]`.
"""

[words.segundo]
tr = "секунда; второй"
pos = "сущ."
lemma = "el segundo"

[words.luego]
tr = "потом, затем"
pos = "нар."
lemma = "luego"

[words.otro]
tr = "другой"
pos = "опр."
lemma = "otro"

[words.arde]
tr = "(оно) горит"
pos = "глаг."
lemma = "arder"
grammar = """
**arde** — *presente*, 3 л. ед. ч., от **arder** («гореть»).

`ard·[[er]]` → `ard·[[e]]`.
"""

[words.sin]
tr = "без"
pos = "предл."
lemma = "sin"
grammar = """
**sin** + инфинитив — устойчивая конструкция: «не делая чего-то / без …».

«*arde sin parar*» = «горит, не останавливаясь / без остановки».
"""

[words.parar]
tr = "останавливаться"
pos = "глаг."
lemma = "parar"

[words.s]
tr = "сокр. от «segundos» — секунды"
pos = "имя"
# unit suffix in the instrument readouts (e.g. "184 s")


