[[sentences]]
text = "Emilio trabaja solo en la Estación Oberón."
tr = "Эмилио работает один на станции Оберон."

[[sentences]]
text = "La estación gira alrededor de Urano, lejos, en el frío."
tr = "Станция вращается вокруг Урана, далеко, в холоде."

[[sentences]]
text = "Es un punto pequeño en la ruta."
tr = "Это маленькая точка на маршруте."

[[sentences]]
text = "Cada mes, un convoy de carga pasa por aquí."
tr = "Каждый месяц здесь проходит грузовой конвой."

[[sentences]]
text = "Emilio revisa los papeles, firma y deja pasar el convoy."
tr = "Эмилио проверяет бумаги, ставит подпись и пропускает конвой."

[[sentences]]
text = "El convoy lleva comida y aire a la Colonia de Umbriel, más afuera, en una luna oscura."
tr = "Конвой везёт еду и воздух в колонию Умбриэль, дальше, на тёмной луне."

[[sentences]]
text = "Emilio no conoce a la gente de Umbriel."
tr = "Эмилио не знает людей Умбриэля."
note = """
*Личное «a»:* перед прямым дополнением-человеком ставится `a`: `conoce a la gente`.

Само `a` здесь не переводится — это маркер одушевлённого объекта.
"""

[[sentences]]
text = "Solo conoce sus nombres en la lista."
tr = "Он знает только их имена в списке."

[[sentences]]
text = "Son setenta personas."
tr = "Их семьдесят человек."

[[sentences]]
text = "Cada mes ve los mismos nombres."
tr = "Каждый месяц он видит одни и те же имена."

[[sentences]]
text = "Esta mañana llegó una orden de Ceres."
tr = "Этим утром пришёл приказ с Цереры."

[[sentences]]
text = "La orden es vieja: viajó muchas semanas por el espacio."
tr = "Приказ старый: он летел много недель через космос."

[[sentences]]
text = "CENTRAL DE CERES."
tr = "ЦЕНТР ЦЕРЕРЫ."

[[sentences]]
text = "La Colonia de Umbriel ya no es viable."
tr = "Колония Умбриэль больше не жизнеспособна."

[[sentences]]
text = "Detener el próximo convoy."
tr = "Остановить следующий конвой."

[[sentences]]
text = "Cerrar la ruta."
tr = "Закрыть маршрут."

[[sentences]]
text = "Emilio lee la orden otra vez."
tr = "Эмилио читает приказ ещё раз."

[[sentences]]
text = "Mira la lista de nombres."
tr = "Смотрит на список имён."

[[sentences]]
text = "Setenta personas que esperan la comida."
tr = "Семьдесят человек, которые ждут еду."

[[sentences]]
text = "Ellos no saben nada."
tr = "Они ничего не знают."

[[sentences]]
text = "Ceres está muy lejos."
tr = "Церера очень далеко."

[[sentences]]
text = "Nadie en Ceres ha visto Umbriel."
tr = "Никто на Церере не видел Умбриэль."
note = """
*Pretérito perfecto:* `haber` (в наст. вр.) + причастие. `ha visto` = «видел (когда-либо)».

Причастие от **ver** неправильное: **visto**.
"""

[[sentences]]
text = "Para ellos, la colonia es solo un número en un mapa."
tr = "Для них колония — это просто номер на карте."

[[sentences]]
text = "Emilio piensa en eso."
tr = "Эмилио думает об этом."

[[sentences]]
text = "Él también es un número para Ceres: una firma al final de un informe gris."
tr = "Он тоже номер для Цереры: подпись в конце серого отчёта."

[[sentences]]
text = "Tal vez por eso entiende a la gente de Umbriel."
tr = "Может быть, поэтому он понимает людей Умбриэля."

[[sentences]]
text = "Si Emilio firma, el convoy se detiene."
tr = "Если Эмилио подпишет, конвой остановится."
note = """
*Реальное условие (1-й тип):* `si` + *presente*, главная часть тоже в *presente*.

Часть с `si` может стоять в начале или в конце.
"""

[[sentences]]
text = "La gente de Umbriel va a esperar en la oscuridad."
tr = "Люди Умбриэля будут ждать в темноте."

[[sentences]]
text = "Tal vez nadie va a venir nunca."
tr = "Может быть, никто никогда не придёт."

[[sentences]]
text = "Si no firma, la orden se queda en su mesa."
tr = "Если он не подпишет, приказ останется на его столе."

[[sentences]]
text = "El convoy pasa otra vez, como siempre."
tr = "Конвой пройдёт снова, как всегда."

[[sentences]]
text = "Nadie en Ceres va a saberlo pronto."
tr = "Никто на Церере не узнает об этом скоро."
note = """
**saberlo** = **saber** + **lo** («это»). Местоимение присоединяется к инфинитиву.

`va a saberlo` — *futuro próximo*: `ir` + `a` + инфинитив.
"""

[[sentences]]
text = "El próximo convoy llega en tres días."
tr = "Следующий конвой прибудет через три дня."

[[sentences]]
text = "Emilio tiene la orden en la mano."
tr = "Эмилио держит приказ в руке."

[[sentences]]
text = "La mesa está fría."
tr = "Стол холодный."

[[sentences]]
text = "Afuera, Urano gira despacio, azul y callado."
tr = "Снаружи Уран медленно вращается, синий и молчаливый."

[[sentences]]
text = "Emilio todavía no firma."
tr = "Эмилио всё ещё не подписывает."
