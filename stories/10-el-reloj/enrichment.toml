[[sentences]]
text = "Sofía mantiene el software viejo de la Colonia Brasa, en un pequeño asteroide del cinturón de Kuiper."
tr = "Софи́я поддерживает старое программное обеспечение Колонии Браса — на маленьком астероиде в поясе Койпера."

[[sentences]]
text = "Aquí viven ochenta personas."
tr = "Здесь живут восемьдесят человек."

[[sentences]]
text = "Casi todas son religiosas."
tr = "Почти все — верующие."

[[sentences]]
text = "Casi todas confían en el reloj de la colonia."
tr = "Почти все доверяют часам колонии."

[[sentences]]
text = "Esta mañana Sofía revisa el módulo del tiempo."
tr = "Этим утром Софи́я проверяет модуль времени."

[[sentences]]
text = "Encuentra un error simple: cada año, el reloj pierde veintidós minutos."
tr = "Она находит простую ошибку: каждый год часы теряют двадцать две минуты."

[[sentences]]
text = "El error empezó hace dieciocho años."
tr = "Ошибка появилась восемнадцать лет назад."

[[sentences]]
text = "Hoy la hora de la colonia está mal por casi siete horas."
tr = "Сегодня время колонии расходится примерно на семь часов."

[[sentences]]
text = "Sofía mira los datos otra vez."
tr = "Софи́я снова смотрит на данные."

[[sentences]]
text = "Es correcto."
tr = "Всё верно."

[[sentences]]
text = "Durante dieciocho años, la colonia ha rezado a la hora equivocada."
tr = "Восемнадцать лет колония молилась не в то время."

[[sentences]]
text = "Ha cosechado a la hora equivocada."
tr = "Собирала урожай не в то время."

[[sentences]]
text = "Ha dormido y ha trabajado a la hora equivocada."
tr = "Спала и работала не в то время."

[[sentences]]
text = "Nadie lo ha notado."
tr = "Никто не заметил."

[[sentences]]
text = "Sofía conoce al autor del error."
tr = "Софи́я знает автора этой ошибки."

[[sentences]]
text = "Es Don Esteban, hermano del Reverendo."
tr = "Это дон Эстебан, брат Преподобного."

[[sentences]]
text = "Don Esteban ya no programa."
tr = "Дон Эстебан больше не программирует."

[[sentences]]
text = "Vive tranquilo, lee y ayuda en el jardín."
tr = "Живёт спокойно, читает и помогает в саду."

[[sentences]]
text = "Si Sofía corrige el reloj, la misa de mañana va a ser a otra hora."
tr = "Если Софи́я исправит часы, завтрашняя месса будет в другое время."

[[sentences]]
text = "Las fiestas van a cambiar."
tr = "Праздники сдвинутся."

[[sentences]]
text = "El Reverendo va a tener preguntas."
tr = "У Преподобного будут вопросы."

[[sentences]]
text = "Don Esteban va a tener vergüenza."
tr = "Дону Эстебану будет стыдно."

[[sentences]]
text = "Si Sofía no corrige el reloj, la colonia va a continuar como siempre."
tr = "Если Софи́я не исправит часы, колония будет жить как прежде."

[[sentences]]
text = "Las estrellas no se quejan."
tr = "Звёзды не жалуются."

[[sentences]]
text = "El asteroide no se queja."
tr = "Астероид не жалуется."

[[sentences]]
text = "Solo los archivos saben que el tiempo de aquí no coincide con el tiempo del universo."
tr = "Только файлы знают, что здешнее время не совпадает со временем вселенной."

[[sentences]]
text = "Sofía no decide nada."
tr = "Софи́я ничего не решает."

[[sentences]]
text = "pendiente — deriva de 22 minutos por año."
tr = "(внутри комментария: «нерешено — дрейф 22 минуты в год.»)"

[[sentences]]
text = "Escribe un comentario en el código: «pendiente — deriva de 22 minutos por año. Revisar antes de la próxima cosecha»."
tr = "Пишет комментарий в коде: «нерешено — дрейф 22 минуты в год. Пересмотреть до следующего урожая»."

[[sentences]]
text = "Guarda el archivo."
tr = "Сохраняет файл."

[[sentences]]
text = "Cierra el editor."
tr = "Закрывает редактор."

[[sentences]]
text = "Afuera, las luces de la colonia siguen su horario tranquilo."
tr = "Снаружи огни колонии живут своим тихим расписанием."

[[sentences]]
text = "Es la hora del té, según el reloj de Brasa."
tr = "Время чая — по часам Брасы."

[[sentences]]
text = "En otra parte del universo, ya es de noche."
tr = "В другой части вселенной уже ночь."
