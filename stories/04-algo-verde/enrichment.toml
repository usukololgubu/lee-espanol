grammar = """
**por** — предлог. Здесь: `mira el hielo por la ventana` = "смотрит на лёд **через** окно".

Базовые значения: причина ("из-за"), путь/средство ("через, по"), время суток ("по утрам"). Не путать с **para** ("для, чтобы").
"""

[words."primero"]
tr = "первый"
pos = "прил."
lemma = "primero"

[words."protocolo"]
tr = "протокол"
pos = "сущ."
lemma = "el protocolo"

[words."que"]
tr = "что, который (относит. мест. / союз)"
pos = "мест."
lemma = "que"

[words."queda"]
tr = "(se queda) остаётся, замирает"
pos = "глаг."
lemma = "quedar"
grammar = """
**(se) queda** — *presente*, 3 л. ед. ч., от **quedarse** ("остаться, замереть").

*Возвратный.* `Lucía se queda quieta` = "Lucía замирает (остаётся неподвижной)".

Правильный глагол на `-ar`: `qued·[[ar]]` → `qued·[[a]]`.
"""

[words."quieren"]
tr = "(они) хотят"
pos = "глаг."
lemma = "querer"
grammar = """
**quieren** — *presente*, 3 л. мн. ч., от **querer** ("хотеть, любить").

*Чередование в корне:* `qu[[e]]rer → qu[[ie]]ren` (e → ie под ударением).

Спряжение: `quiero · quieres · quiere · queremos · queréis · quieren`.
"""

[words."quieta"]
tr = "тихая, неподвижная (ж.)"
pos = "прил."
lemma = "quieto"

[words."quizás"]
tr = "возможно, может быть"
pos = "нар."
lemma = "quizás"

[words."reporta"]
tr = "(она) сообщает, докладывает"
pos = "глаг."
lemma = "reportar"
grammar = """
**reporta** — *presente*, 3 л. ед. ч., от **reportar** ("сообщать, докладывать").

Правильный глагол на `-ar`: `report·[[ar]]` → `report·[[a]]`.
"""

[words."reportar"]
tr = "сообщить, доложить (инф.)"
pos = "глаг."
lemma = "reportar"

[words."se"]
tr = "(возвратная частица)"
pos = "мест."
lemma = "se"
grammar = """
**se** — возвратное местоимение, 3 л.

*Возвратные глаголы* строятся с **se**: `llamar` ("звать") → `llamarse` ("называться"), `mover` ("двигать") → `moverse` ("двигаться"), `quedar` → `quedarse` ("остаться, замереть").

Личные варианты: `me · te · se · nos · os · se`.
"""

[words."seguir"]
tr = "продолжать; оставаться (инф.)"
pos = "глаг."
lemma = "seguir"
grammar = """
**seguir** — инфинитив, "продолжать(ся), оставаться". *Чередование:* `s[[e]]guir → s[[i]]gue` (e → i, как `pedir`, `derretir`).

В тексте — в составе *futuro próximo*: `van a seguir` = "(они) останутся / будут продолжать (быть)".

Спряжение: `sigo · sigues · sigue · seguimos · seguís · siguen`.
"""

[words."segundo"]
tr = "второй"
pos = "прил."
lemma = "segundo"

[words."si"]
tr = "если"
pos = "союз"
lemma = "si"
grammar = """
**si** — союз "если". *Без ударения* (отличается от **sí** — "да, конечно").

В A1-конструкции `si + presente, presente / futuro próximo`: `si hay vida, la misión termina` ("если есть жизнь, миссия заканчивается").
"""

[words."simple"]
tr = "простой"
pos = "прил."
lemma = "simple"

[words."sobre"]
tr = "на, над; о (предл.)"
pos = "предл."
lemma = "sobre"

[words."sola"]
tr = "одна, одинокая (ж.)"
pos = "прил."
lemma = "solo"

[words."son"]
tr = "(они) суть, являются"
pos = "глаг."
lemma = "ser"
grammar = """
**son** — *presente*, 3 л. мн. ч., от **ser** ("быть").

*Очень неправильный.* Спряжение: `soy · eres · es · somos · sois · son`.

Здесь: `son filamentos` = "это нити / они нити" (идентификация — поэтому **ser**, а не **estar**).
"""

[words."sonda"]
tr = "зонд"
pos = "сущ."
lemma = "la sonda"

[words."su"]
tr = "её / его / их"
pos = "опр."
lemma = "su"

[words."sube"]
tr = "(она) поднимается"
pos = "глаг."
lemma = "subir"
grammar = """
**sube** — *presente*, 3 л. ед. ч., от **subir** ("подниматься, идти вверх").

Правильный глагол на `-ir`: `sub·[[ir]]` → `sub·[[e]]`.
"""

[words."sus"]
tr = "её / его / их (мн.)"
pos = "опр."
lemma = "su"
grammar = """
**sus** — притяжательное "её/его/их" перед существительным **во мн. ч.**

Согласование по числу определяемого, не по числу владельца: `su padre` ("её отец") → `sus padres` ("её родители / её отцы").
"""

[words."termina"]
tr = "(она) заканчивается"
pos = "глаг."
lemma = "terminar"
grammar = """
**termina** — *presente*, 3 л. ед. ч., от **terminar** ("заканчиваться, кончаться").

Правильный глагол на `-ar`: `termin·[[ar]]` → `termin·[[a]]`.
"""

[words."tiene"]
tr = "(она/оно) имеет, у неё есть"
pos = "глаг."
lemma = "tener"
grammar = """
**tiene** — *presente*, 3 л. ед. ч., от **tener** ("иметь, у X есть").

*Очень неправильный.* *Чередование:* `t[[e]]ner → t[[ie]]ne` (e → ie), и 1 л. — особое: `yo tengo`.

Спряжение: `tengo · tienes · tiene · tenemos · tenéis · tienen`.

`El hielo tiene agua` = "у льда есть вода / лёд содержит воду".
"""

[words."tierra"]
tr = "Земля (планета)"
pos = "имя"
# no lemma → no SpanishDict link

[words."todo"]
tr = "всё"
pos = "мест."
lemma = "todo"

[words."toma"]
tr = "(она) берёт"
pos = "глаг."
lemma = "tomar"
grammar = """
**toma** — *presente*, 3 л. ед. ч., от **tomar** ("брать, принимать").

Правильный глагол на `-ar`: `tom·[[ar]]` → `tom·[[a]]`.
"""

[words."trabaja"]
tr = "(она) работает"
pos = "глаг."
lemma = "trabajar"
grammar = """
**trabaja** — *presente*, 3 л. ед. ч., от **trabajar** ("работать").

Правильный глагол на `-ar`: `trabaj·[[ar]]` → `trabaj·[[a]]`.
"""

[words."trabajo"]
tr = "работа"
pos = "сущ."
lemma = "el trabajo"

[words."tres"]
tr = "три"
pos = "числ."
lemma = "tres"

[words."un"]
tr = "один; неопр. артикль м. р."
pos = "арт."
lemma = "un"

[words."una"]
tr = "одна; неопр. артикль ж. р."
pos = "арт."
lemma = "una"

[words."uno"]
tr = "один (мест.)"
pos = "числ."
lemma = "uno"

[words."va"]
tr = "(она) идёт / собирается"
pos = "глаг."
lemma = "ir"
grammar = """
**va** — *presente* от **ir** ("идти"), 3 л. ед. ч.

*Очень неправильный.* Спряжение: `voy · vas · va · vamos · vais · van`.

*В конструкции* **va a + инф.** = *futuro próximo* ("собирается X", близкое будущее). Здесь **va** — маркёр будущего, а не "идёт".

Пример: `va a cerrar la misión` = "(скоро) закроет миссию".
"""

[words."van"]
tr = "(они) идут / собираются"
pos = "глаг."
lemma = "ir"
grammar = """
**van** — *presente* от **ir** ("идти"), 3 л. мн. ч.

*В конструкции* **van a + инф.** = *futuro próximo* для "они": `van a seguir aquí` = "(они) останутся здесь".

Спряжение: `voy · vas · va · vamos · vais · van`.
"""

[words."ventana"]
tr = "окно"
pos = "сущ."
lemma = "la ventana"

[words."verde"]
tr = "зелёный, зелёное"
pos = "прил."
lemma = "verde"
grammar = """
**verde** — прил. "зелёный". *По роду не меняется* (как `grande`, `triste`): `un árbol verde` (м.) / `una hoja verde` (ж.). Только по числу: ед. `verde` / мн. `verdes`.
"""

[words."verdes"]
tr = "зелёные"
pos = "прил."
lemma = "verde"

[words."vida"]
tr = "жизнь"
pos = "сущ."
lemma = "la vida"

[words."viven"]
tr = "(они) живут"
pos = "глаг."
lemma = "vivir"
grammar = """
**viven** — *presente*, 3 л. мн. ч., от **vivir** ("жить").

Правильный глагол на `-ir`: `viv·[[ir]]` → `viv·[[en]]`.
"""

[words."vivir"]
tr = "жить (инф.)"
pos = "глаг."
lemma = "vivir"

[words."vivos"]
tr = "живые"
pos = "прил."
lemma = "vivo"
grammar = """
**vivos** — прил. "живой", м. р. мн. ч.

*С **estar**:* `están vivos` = "они живы" (временное состояние — пока живы). С **ser** это было бы странно — состояние жив/мёртв всегда воспринимается как актуальное, поэтому **estar**.
"""

[words."volver"]
tr = "вернуться (инф.)"
pos = "глаг."
lemma = "volver"
grammar = """
**volver** — инфинитив, "вернуться". *Чередование:* `v[[o]]lver → v[[ue]]lve` (o → ue под ударением).

В тексте — в составе *futuro próximo*: `va a volver a casa` = "(скоро) вернётся домой".

Спряжение: `vuelvo · vuelves · vuelve · volvemos · volvéis · vuelven`.
"""

