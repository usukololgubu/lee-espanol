**pregunta** — *presente*, 3 л. ед. ч., от **preguntar** ("спрашивать").

`pregunt·[[ar]]` → `pregunt·[[a]]`.

*Нюанс:* **preguntar** — задавать вопрос; **pedir** — просить о чём-то.
"""

[words."preguntar"]
tr = "спрашивать, задавать вопросы"
pos = "глаг."
lemma = "preguntar"

[words."primer"]
tr = "первый"
pos = "прил."
lemma = "primero"
grammar = """
**primer** — апокопа от **primero** перед сущ. *м. р.* ед. ч.

`primer[[o]] oficial` → `primer oficial` (теряет `-o`). Перед ж. р. — полная форма: **primera**.
"""

[words."privado"]
tr = "частный, личный"
pos = "прил."
lemma = "privado"

[words."qué"]
tr = "что, какой"
pos = "мест."
lemma = "qué"
grammar = """
**qué** — вопросит./относит. с ударением.

Здесь: `Inés sabe [[qué]] es` = "Инес знает, [[что]] это". Без ударения **que** — союз "что/который".
"""

[words."quiero"]
tr = "(я) хочу"
pos = "глаг."
lemma = "querer"
grammar = """
**quiero** — *presente*, 1 л. ед. ч., от **querer** ("хотеть, любить").

*Чередование в корне:* `qu[[e]]rer → qu[[ie]]ro` (e → ie под ударением).
"""

[words."quizás"]
tr = "может быть, возможно"
pos = "нар."
lemma = "quizás"

[words."registro"]
tr = "запись, реестр"
pos = "сущ."
lemma = "el registro"

[words."rota"]
tr = "сломанная, разбитая"
pos = "прил."
lemma = "roto"
grammar = """
**rota** — *ж. р., ед. ч.* от **roto** ("сломанный").

Неправильное причастие от **romper** ("ломать"), здесь — в роли прил.: `una nave [[rota]]`.
"""

[words."ruta"]
tr = "маршрут, путь"
pos = "сущ."
lemma = "la ruta"

[words."saber"]
tr = "знать (факт)"
pos = "глаг."
lemma = "saber"
grammar = """
**saber** — *инфинитив* ("знать факт, уметь").

*Нюанс:* **saber** — знать что-то (`saber la verdad`); **conocer** — быть знакомым (`conocer a alguien`).
"""

[words."sabe"]
tr = "(она) знает"
pos = "глаг."
lemma = "saber"
grammar = """
**sabe** — *presente*, 3 л. ед. ч., от **saber**.

*Неправильный* в 1 л. ед. (**sé**), но в 3 л. — как обычный `-er`: `sab·[[e]]`.
"""

[words."se"]
tr = "себя, -ся (возвратная частица)"
pos = "мест."
lemma = "se"
grammar = """
**se** — возвратная частица, 3 л.

В конструкции `Su nave [[se]] llama La Mula` показывает возвратный глагол **llamarse** ("называться", букв. "называть себя").
"""

[words."semanas"]
tr = "недели"
pos = "сущ."
lemma = "la semana"

[words."si"]
tr = "если"
pos = "союз"
lemma = "si"
grammar = """
**si** — союз "если" (без ударения).

*Не путать* с **sí** (с ударением — "да").
"""

[words."siempre"]
tr = "всегда"
pos = "нар."
lemma = "siempre"

[words."silenciosas"]
tr = "тихие, безмолвные"
pos = "прил."
lemma = "silencioso"
grammar = """
**silenciosas** — *ж. р., мн. ч.* от **silencioso**.

Согласуется с **piedras** (ж. р., мн. ч.): `piedras grises y [[silenciosas]]`.
"""

[words."solo"]
tr = "только; одинокий"
pos = "нар."
lemma = "solo"

[words."su"]
tr = "его, её, их, ваш"
pos = "опр."
lemma = "su"
grammar = """
**su** — притяж. опр., 3 л. (ед. и мн.): "его / её / их / ваш".

Согласуется с *обладаемым*, не с владельцем: `[[su]] nave` (его корабль), `[[su]] tripulación` (его экипаж).
"""

[words."tantas"]
tr = "столько, так много (ж. мн.)"
pos = "опр."
lemma = "tanto"
grammar = """
**tantas** — *ж. р., мн. ч.* от **tanto**.

Согласуется с **piedras** (ж. р., мн. ч.): `entre [[tantas]] piedras`.
"""

[words."tarde"]
tr = "поздно"
pos = "нар."
lemma = "tarde"

[words."te"]
tr = "тебе, тебя"
pos = "мест."
lemma = "te"
grammar = """
**te** — местоим. 2 л. ед. ч. (`tú`), косв. или прям. дополнение.

Здесь: `[[te]] mando unas coordenadas` = "[[тебе]] посылаю координаты".
"""

[words."toma"]
tr = "(он) берёт, пьёт"
pos = "глаг."
lemma = "tomar"
grammar = """
**toma** — *presente*, 3 л. ед. ч., от **tomar** ("брать; пить").

Правильный на `-ar`: `tom·[[ar]]` → `tom·[[a]]`.
"""

[words."trabajo"]
tr = "работа"
pos = "сущ."
lemma = "el trabajo"

[words."traductora"]
tr = "переводчица"
pos = "сущ."
lemma = "la traductora"

[words."tres"]
tr = "три"
pos = "числ."
lemma = "tres"

[words."tripulación"]
tr = "экипаж, команда"
pos = "сущ."
lemma = "la tripulación"
grammar = """
**la tripulación** — сущ. *ж. р.*, ед. ч. (собирательное).

Сущ. на `-ción` всегда *ж. р.*: `la nac[[ión]]`, `la canc[[ión]]`, `la tripulac[[ión]]`.
"""

[words."un"]
tr = "один; неопр. артикль (м. р.)"
pos = "арт."
lemma = "un"

[words."una"]
tr = "одна; неопр. артикль (ж. р.)"
pos = "арт."
lemma = "una"

[words."unas"]
tr = "какие-то, несколько (ж. мн.)"
pos = "арт."
lemma = "unas"
grammar = """
**unas** — неопр. арт., *ж. р., мн. ч.*

Перед **coordenadas** (ж. р., мн.) даёт значение "несколько, какие-то": `[[unas]] coordenadas` = "кое-какие координаты".
"""

[words."vacío"]
tr = "пустота"
pos = "сущ."
lemma = "el vacío"

[words."va"]
tr = "(он) идёт, едет; собирается"
pos = "глаг."
lemma = "ir"
grammar = """
**va** — *presente*, 3 л. ед. ч., от **ir** ("идти, ехать").

*Неправильный.* Спряж.: `voy · vas · va · vamos · vais · van`.

*Periphrastic future* (`va a + инф.`): "собирается / будет ...".

Пример из текста: `La empresa [[va a]] preguntar` = "компания будет задавать вопросы".

Структура: **ir** (в наст.) + **a** + инфинитив.
"""

[words."ventana"]
tr = "окно"
pos = "сущ."
lemma = "la ventana"

[words."viaja"]
tr = "(он) путешествует, едет"
pos = "глаг."
lemma = "viajar"
grammar = """
**viaja** — *presente*, 3 л. ед. ч., от **viajar** ("путешествовать").

`viaj·[[ar]]` → `viaj·[[a]]`.
"""

[words."viaje"]
tr = "поездка, путешествие"
pos = "сущ."
lemma = "el viaje"

[words."vieja"]
tr = "старая (давняя)"
pos = "прил."
lemma = "viejo"
grammar = """
**vieja** — *ж. р., ед. ч.* от **viejo**.

*Нюанс позиции:* перед сущ. часто значит "давний" (`una [[vieja]] amiga` = "давняя подруга"); после сущ. — "старый по возрасту". Здесь — перед.
"""

[words."y"]
tr = "и"
pos = "союз"
lemma = "y"

