*В конструкции* **va a + инф.** = *futuro próximo* ("собирается X", близкое будущее). Здесь **va** — маркёр будущего, а не "идёт".

Пример: `va a recogerla` = "(скоро) её заберёт".
"""

[words."viaje"]
tr = "путешествие, рейс"
pos = "сущ."
lemma = "el viaje"

[words."viejo"]
tr = "старый; (как обращение) старик"
pos = "прил."
lemma = "viejo"

[words."viene"]
tr = "идёт, исходит, приходит"
pos = "глаг."
lemma = "venir"
grammar = """
**viene** — *presente* от **venir** ("приходить, идти / исходить откуда-то"), 3 л. ед. ч.

*Чередование:* `v[[e]]nir → v[[ie]]ne` (e → ie). И 1 л. — особый: `yo vengo`.

Спряжение: `vengo · vienes · viene · venimos · venís · vienen`.
"""

[words."y"]
tr = "и"
pos = "союз"
lemma = "y"

[words."yo"]
tr = "я"
pos = "мест."
lemma = "yo"

[words."zumbido"]
tr = "гудение, жужжание"
pos = "сущ."
lemma = "el zumbido"

