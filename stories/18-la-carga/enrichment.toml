tr = "«Ла-Гарса» (Цапля) — корабль-кометолов Надии"
pos = "имя"

[[phrases]]
form = "PK-9"
tr = "PK-9 — крошечный рудничный лагерь на астероиде (≈6 человек)"
pos = "имя"

[[phrases]]
form = "desde hace"
tr = "(вот уже) — о длительности до сих пор"
pos = "идиома"
literal = "с тех пор как делает"
parts = [
  { w = "desde", tr = "с, от" },
  { w = "hace", tr = "делает (об отрезке времени)" },
]
grammar = """
**desde hace** + время — «(вот уже) … (и до сих пор)».

**desde hace cuatro meses** = «(вот уже) четыре месяца».
"""

[[phrases]]
form = "tiene que"
tr = "(она) должна, ей нужно"
pos = "идиома"
lemma = "tener que"
literal = "имеет что"
parts = [
  { w = "tiene", tr = "имеет (от tener)" },
  { w = "que",   tr = "что" },
]
grammar = """
**tener que** + инфинитив — обязанность «должен / нужно».

Спрягается только **tener**: **tiene que soltar** «должна сбросить».
"""

# ---------------------------------------------------------------------------
# SENTENCES
# ---------------------------------------------------------------------------

[[sentences]]
text = "Nadia trabaja sola."
tr = "Надия работает одна."

[[sentences]]
text = "Su compañero, Leo, duerme en la cápsula desde hace cuatro meses."
tr = "Её напарник, Лео, спит в капсуле вот уже четыре месяца."
note = """
**desde hace** + время — «(вот уже) …»: длительность, которая тянется до сих пор.
"""

[[sentences]]
text = "En el cometero La Garza siempre duerme uno y el otro vigila."
tr = "На кометолове «Ла-Гарса» всегда один спит, а другой дежурит."

[[sentences]]
text = "Así funciona: el hielo del cometa no espera."
tr = "Так это устроено: лёд кометы не ждёт."

[[sentences]]
text = "El trabajo es lento y frío."
tr = "Работа медленная и холодная."

[[sentences]]
text = "Nadia corta hielo del núcleo, lo guarda en las bodegas y mira las estrellas."
tr = "Надия режет лёд из ядра, складывает его в трюмы и смотрит на звёзды."

[[sentences]]
text = "El cometa cae hacia el Sol despacio, muy despacio."
tr = "Комета падает к Солнцу медленно, очень медленно."

[[sentences]]
text = "Falta casi un año para llegar a Ceres y vender la carga."
tr = "Почти год ещё до Цереры, чтобы продать груз."
note = """
**Falta + время + para + инфинитив** — «осталось … до того, чтобы …».
"""

[[sentences]]
text = "Bitácora, día 121."
tr = "Бортовой журнал, день 121."

[[sentences]]
text = "Bodegas al 80%."
tr = "Трюмы на 80%."

[[sentences]]
text = "Todo normal."
tr = "Всё нормально."

[[sentences]]
text = "Leo sigue dormido."
tr = "Лео по-прежнему спит."
note = """
**seguir + прилагательное/деепричастие** — «продолжать быть …»: **sigue dormido** «всё ещё спит».
"""

[[sentences]]
text = "Una mañana, la consola muestra un aviso."
tr = "Однажды утром консоль показывает сообщение."

[[sentences]]
text = "Nadia lo lee dos veces."
tr = "Надия читает его дважды."

[[sentences]]
text = "Alerta de ruta: el cometa va a pasar muy cerca de la roca PK-9."
tr = "Тревога курса: комета пройдёт очень близко от астероида PK-9."
note = """
*futuro próximo:* **va a pasar** = **ir** (наст. вр.) + `a` + инфинитив «пройдёт / вот-вот пройдёт».
"""

[[sentences]]
text = "Población estimada: 6 personas."
tr = "Оценочное население: 6 человек."

[[sentences]]
text = "PK-9 es un campamento minero pequeño."
tr = "PK-9 — маленький рудничный лагерь."

[[sentences]]
text = "Casi nadie lo conoce."
tr = "Почти никто о нём не знает."

[[sentences]]
text = "Seis personas que no saben nada."
tr = "Шесть человек, которые ничего не знают."

[[sentences]]
text = "El cometa no va a chocar, pero va a pasar tan cerca que su polvo y su hielo pueden barrer el campamento."
tr = "Комета не врежется, но пройдёт так близко, что её пыль и лёд могут смести лагерь."
note = """
**tan … que …** — «так(ой) …, что …»: следствие. **pueden barrer** «могут смести».
"""

[[sentences]]
text = "Hay una solución."
tr = "Есть решение."

[[sentences]]
text = "Nadia puede encender los motores y desviar La Garza y el cometa unos grados."
tr = "Надия может включить двигатели и увести «Ла-Гарсу» и комету на несколько градусов в сторону."

[[sentences]]
text = "Pero para eso tiene que soltar toda la carga."
tr = "Но для этого ей нужно сбросить весь груз."
note = """
**tener que** + инфинитив — обязанность: **tiene que soltar** «должна сбросить».
"""

[[sentences]]
text = "Todo el hielo."
tr = "Весь лёд."

[[sentences]]
text = "Todo el año de trabajo."
tr = "Весь год работы."

[[sentences]]
text = "El pago de Leo también."
tr = "И заработок Лео тоже."

[[sentences]]
text = "Nadia mira la cápsula donde Leo duerme."
tr = "Надия смотрит на капсулу, где спит Лео."

[[sentences]]
text = "No va a despertarlo."
tr = "Она не станет его будить."
note = """
**va a despertarlo** = *futuro próximo* + местоимение **lo** на конце инфинитива «(не) разбудит его».
"""

[[sentences]]
text = "Esta decisión es solo de ella."
tr = "Это решение — только её."

[[sentences]]
text = "Piensa en las seis personas que duermen tranquilas en PK-9, sin saber que un cometa las mira desde lejos."
tr = "Она думает о шести людях, что спокойно спят на PK-9, не зная, что комета смотрит на них издалека."
note = """
**sin + инфинитив** — «не делая чего-то»: **sin saber** «не зная».
"""

[[sentences]]
text = "Piensa en Leo, que va a despertar y va a preguntar por el dinero."
tr = "Она думает о Лео, который проснётся и спросит про деньги."

[[sentences]]
text = "Pone la mano sobre el botón de los motores."
tr = "Она кладёт руку на кнопку двигателей."

[[sentences]]
text = "Afuera, el hielo brilla."
tr = "Снаружи блестит лёд."
