tr = "Пабло двенадцать лет."

[[sentences]]
text = "Pablo trae flores y una foto vieja."
tr = "Пабло приносит цветы и старую фотографию."

[[sentences]]
text = "—Abuelo, ¿qué es esto?"
tr = "— Дедушка, что это?"

[[sentences]]
text = "—pregunta Pablo."
tr = "— спрашивает Пабло."

[[sentences]]
text = "La foto muestra un edificio alto, gris, con ventanas brillantes."
tr = "На фотографии — высокое серое здание с блестящими окнами."

[[sentences]]
text = "Joaquín mira la foto."
tr = "Хоакин смотрит на фотографию."

[[sentences]]
text = "Es Madrid."
tr = "Это Мадрид."

[[sentences]]
text = "La ciudad donde nació su madre."
tr = "Город, где родилась его мать."

[[sentences]]
text = "Joaquín no ha visto Madrid nunca, pero su madre se la describía cada noche."
tr = "Хоакин никогда не видел Мадрид, но его мать описывала ему его каждую ночь."

[[sentences]]
text = "—Es una casa muy grande —dice Joaquín—."
tr = "— Это очень большой дом, — говорит Хоакин."

[[sentences]]
text = "En un lugar muy lejos."
tr = "В очень далёком месте."

[[sentences]]
text = "—¿En el cielo?"
tr = "— На небе?"

[[sentences]]
text = "—pregunta Pablo—."
tr = "— спрашивает Пабло."

[[sentences]]
text = "¿Cerca del Patrón?"
tr = "— Рядом с Покровителем?"

[[sentences]]
text = "Joaquín no responde."
tr = "Хоакин не отвечает."

[[sentences]]
text = "Mira por la ventana."
tr = "Он смотрит в окно."

[[sentences]]
text = "Los hijos del barrio juegan en la plaza."
tr = "Дети района играют на площади."

[[sentences]]
text = "Cantan canciones al Patrón."
tr = "Они поют песни Покровителю."

[[sentences]]
text = "Las canciones son bonitas."
tr = "Песни красивые."

[[sentences]]
text = "Si Joaquín cuenta la verdad, Pablo va a contar la verdad."
tr = "Если Хоакин расскажет правду, Пабло расскажет её тоже."

[[sentences]]
text = "La gente se va a enojar."
tr = "Люди рассердятся."

[[sentences]]
text = "Pablo va a estar solo."
tr = "Пабло останется один."

[[sentences]]
text = "Si Joaquín no cuenta nada, la verdad muere con él."
tr = "Если Хоакин не расскажет ничего, правда умрёт вместе с ним."

[[sentences]]
text = "Para siempre."
tr = "Навсегда."

[[sentences]]
text = "—Pablo —dice Joaquín, despacio—."
tr = "— Пабло, — говорит Хоакин медленно."

[[sentences]]
text = "Siéntate aquí."
tr = "— Сядь здесь."

[[sentences]]
text = "Voy a contarte algo."
tr = "— Я расскажу тебе кое-что."

[[sentences]]
text = "Pero después tose."
tr = "Но потом он кашляет."

[[sentences]]
text = "Y cierra los ojos."
tr = "И закрывает глаза."

[[sentences]]
text = "Mañana, quizás."
tr = "Завтра, может быть."

[[sentences]]
text = "Si vive hasta mañana."
tr = "Если доживёт до завтра."
