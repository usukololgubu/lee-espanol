text = "Nadie sabe nada de ella desde entonces."
tr = "С тех пор о нём никто ничего не знает."
note = """
*Двойное отрицание:* **nadie … nada** — в испанском это норма, а не ошибка.
"""

[[sentences]]
text = "Los cuarenta pasajeros todavía duermen."
tr = "Сорок пассажиров всё ещё спят."

[[sentences]]
text = "O ya no duermen."
tr = "Или уже не спят."

[[sentences]]
text = "Tal vez la máquina no sabe la diferencia."
tr = "Может быть, машина не знает разницы."

[[sentences]]
text = "Llamo otra vez."
tr = "Зову ещё раз."

[[sentences]]
text = "¿Hay alguien despierto a bordo?"
tr = "Есть кто-нибудь, кто не спит, на борту?"

[[sentences]]
text = "—pregunto."
tr = "— спрашиваю я."

[[sentences]]
text = "Todos duermen."
tr = "Все спят."

[[sentences]]
text = "Pedimos permiso para atracar."
tr = "Просим разрешение на швартовку."

[[sentences]]
text = "Gracias."
tr = "Спасибо."

[[sentences]]
text = "Siempre la misma frase."
tr = "Всегда одна и та же фраза."

[[sentences]]
text = "La nave se acerca despacio, con paciencia, como un animal cansado que por fin vuelve a casa."
tr = "Корабль приближается медленно, терпеливо, как усталое животное, что наконец возвращается домой."

[[sentences]]
text = "Si abro el muelle, no sé qué voy a encontrar dentro."
tr = "Если я открою причал, я не знаю, что найду внутри."
note = """
*Условие 1-го типа:* `si` + *presente* — реальное условие. Главная часть тоже в настоящем/будущем.
"""

[[sentences]]
text = "Si digo que no, la nave va a seguir sola, hacia el frío, para siempre."
tr = "Если я скажу нет, корабль полетит дальше один, в холод, навсегда."

[[sentences]]
text = "Mi jefe duerme."
tr = "Мой начальник спит."

[[sentences]]
text = "El reglamento es claro: sin lista, no hay permiso."
tr = "Регламент ясен: без списка — нет разрешения."

[[sentences]]
text = "Pero el reglamento no escribió esa palabra, \"gracias\"."
tr = "Но регламент не написал этого слова — «спасибо»."

[[sentences]]
text = "Miro la pantalla."
tr = "Смотрю на экран."

[[sentences]]
text = "La nave espera."
tr = "Корабль ждёт."

[[sentences]]
text = "Tengo la mano sobre el botón."
tr = "Моя рука над кнопкой."

[[sentences]]
text = "Afuera, las luces de Ceres siguen encendidas, tranquilas, como siempre."
tr = "Снаружи огни Цереры по-прежнему горят, спокойные, как всегда."
