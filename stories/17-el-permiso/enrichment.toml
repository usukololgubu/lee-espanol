[[phrases]]
form = "hace setenta años"
tr = "семьдесят лет назад"
pos = "идиома"
lemma = "hacer"
literal = "делает семьдесят лет"
parts = [
  { w = "hace", tr = "делает (3 л. от hacer)" },
  { w = "setenta", tr = "семьдесят" },
  { w = "años", tr = "лет" },
]
grammar = """
**hace** + отрезок времени = «… (тому) назад».

*Дословно* «делает семьдесят лет» = «семьдесят лет назад». Глагол **hace** не меняется.
"""

