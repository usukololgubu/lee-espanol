**reporta** — *presente*, 3 л. ед. ч., от **reportar** ("сообщать, докладывать").

`report·[[ar]]` → `report·[[a]]`

В тексте дважды: 1) `se reporta` — безличное "сообщается"; 2) `si reporta` — обычное "если он сообщит".
"""

[words.roca]
tr = "камень / скала"
pos = "сущ."
lemma = "la roca"

[words.rocas]
tr = "камни"
pos = "сущ."
lemma = "la roca"

[words.rojo]
tr = "красный"
pos = "прил."
lemma = "rojo"

[words.saber]
tr = "знать"
pos = "глаг."
lemma = "saber"
grammar = """
**saber** — *инфинитив* ("знать факт / уметь").

В обороте **ir a + инф.**: `va a saber` = "(он/оно) узнает".
"""

[words.se]
tr = "себя / -ся (возвр. частица)"
pos = "мест."
lemma = "se"
grammar = """
**se** — возвратная/безличная частица.

В тексте дважды:
1. `el polvo se mueve` — возвр., "пыль движется (сама)".
2. `se reporta` — безличное, "сообщается (вообще)".
"""

[words.seguro]
tr = "уверенный"
pos = "прил."
lemma = "seguro"
grammar = """
**estar seguro** — "быть уверенным" (преходящее состояние → **estar**, а не **ser**).
"""

[words.semana]
tr = "неделя"
pos = "сущ."
lemma = "la semana"

[words.semanal]
tr = "еженедельный"
pos = "прил."
lemma = "semanal"

[words.ser]
tr = "быть"
pos = "глаг."
lemma = "ser"
grammar = """
**ser** — *инфинитив* ("быть").

В тексте: `debe ser dicho` — страд. конструкция "должно быть сказано". **ser** + причастие.
"""

[words.si]
tr = "если"
pos = "союз"
lemma = "si"
grammar = """
**si** — условный союз "если" (без ударения; **sí** с ударением — это "да").

`si + presente, … ir a + инф.` — реальное условие: `si reporta el punto, otros van a venir`.
"""

[words.sigue]
tr = "(он) продолжает / следует"
pos = "глаг."
lemma = "seguir"
grammar = """
**sigue** — *presente*, 3 л. ед. ч., от **seguir** ("продолжать, следовать").

*Чередование в корне:* `s[[e]]guir → s[[i]]gue` (e → i).

`seguir con X` = "продолжать что-либо".
"""

[words.simple]
tr = "простой"
pos = "прил."
lemma = "simple"

[words.sombra]
tr = "тень"
pos = "сущ."
lemma = "la sombra"

[words.solo]
tr = "только / один"
pos = "нар."
lemma = "solo"
grammar = """
**solo** — два употребления в тексте:
1. *прил./нар.* "один, в одиночестве": `Hugo trabaja solo`.
2. *нар.* "только": `solo uno` = "только один".
"""

[words.su]
tr = "его / её / их / Ваш"
pos = "опр."
lemma = "su"
grammar = """
**su** — притяж. опр. 3 л., **не различает род владельца**.

`su trabajo` = "его (или её/их/Ваша) работа".
"""

[words.superficie]
tr = "поверхность"
pos = "сущ."
lemma = "la superficie"

[words.sur]
tr = "юг"
pos = "сущ."
lemma = "el sur"

[words.sus]
tr = "его / её / их (мн. предмет.)"
pos = "опр."
lemma = "su"
grammar = """
**sus** — мн. ч. от **su**. Согласуется с **числом владения**, не владельца.

`sus mapas` = "его карты", `sus cámaras` = "его камеры".
"""

[words.tiempo]
tr = "время"
pos = "сущ."
lemma = "el tiempo"

[words.tierras]
tr = "земли"
pos = "сущ."
lemma = "la tierra"

[words.todo]
tr = "весь / всё"
pos = "опр."
lemma = "todo"
grammar = """
**todo** — опр. "весь / всё".

В тексте:
1. `todo movimiento` — "всякое движение".
2. `todo lo que ven` — "всё, что они видят" (с нейтр. **lo**).
"""

[words.trabaja]
tr = "(он) работает"
pos = "глаг."
lemma = "trabajar"
grammar = """
**trabaja** — *presente*, 3 л. ед. ч., от **trabajar** ("работать").

`trabaj·[[ar]]` → `trabaj·[[a]]`
"""

[words.trabajo]
tr = "работа"
pos = "сущ."
lemma = "el trabajo"

[words.tres]
tr = "три"
pos = "числ."
lemma = "tres"

[words.un]
tr = "один / некий (арт.)"
pos = "арт."
lemma = "un"

[words.una]
tr = "одна / некая (арт.)"
pos = "арт."
lemma = "una"

[words.uno]
tr = "один"
pos = "числ."
lemma = "uno"
grammar = """
**uno** — числ. "один" (м. р.).

Перед сущ. м. р. ед. ч. сокращается до **un**: `un paso`. Самостоятельно — **uno**: `solo uno`.
"""

[words.va]
tr = "(он) идёт / собирается"
pos = "глаг."
lemma = "ir"
grammar = """
**va** — *presente*, 3 л. ед. ч., от **ir** ("идти").

*Неправильный.* Спряж.: `voy · vas · va · vamos · vais · van`.

В тексте два употребления:
1. `nadie va` — буквальное "никто не ходит".
2. `va a + инф.` (`va a esperar`, `va a decidir`, `va a saber`) — *futuro próximo*: "(он) сделает / собирается сделать".
"""

[words.van]
tr = "(они) идут / собираются"
pos = "глаг."
lemma = "ir"
grammar = """
**van** — *presente*, 3 л. мн. ч., от **ir**.

В обороте **van a + инф.** — *futuro próximo*: `van a venir` = "(они) придут", `van a llegar` = "прибудут".
"""

[words.ven]
tr = "(они) видят"
pos = "глаг."
lemma = "ver"
grammar = """
**ven** — *presente*, 3 л. мн. ч., от **ver** ("видеть").

*Неправильный.* Спряж.: `veo · ves · ve · vemos · veis · ven`.
"""

[words.venir]
tr = "приходить / прибывать"
pos = "глаг."
lemma = "venir"
grammar = """
**venir** — *инфинитив*.

В обороте **ir a + инф.**: `van a venir` = "(они) придут".
"""

[words.vez]
tr = "раз"
pos = "сущ."
lemma = "la vez"
grammar = """
**la vez** — сущ. *ж. р.*

`una vez a la semana` = "раз в неделю". Также: `otra vez` = "ещё раз, снова".
"""

[words.viejos]
tr = "старые"
pos = "прил."
lemma = "viejo"
grammar = """
**viejos** — *прил.*, м. р. мн. ч., от **viejo**.

Согласуется с *mapas* (м. р. мн.): `los mapas [[viejos]]`.
"""

[words.viento]
tr = "ветер"
pos = "сущ."
lemma = "el viento"

[words.visto]
tr = "увидел (прич.)"
pos = "глаг."
lemma = "ver"
grammar = """
**ha visto** — *pretérito perfecto*, 3 л. ед. ч.

**haber** (наст.) + причастие. У **ver** причастие **неправ.**: **visto** (а не *vido*).
"""

[words.y]
tr = "и"
pos = "союз"
lemma = "y"


# ───────────────────────────── SENTENCES ─────────────────────────────

[[sentences]]
text = "Hugo trabaja solo en la Estación Fobos."
tr = "Уго работает один на Станции Фобос."

[[sentences]]
text = "Su trabajo es simple: actualizar los mapas de polvo de Marte."
tr = "Его работа проста: обновлять карты пыли Марса."

[[sentences]]
text = "Mira la superficie con sus cámaras, mide el viento rojo, dibuja líneas en una pantalla."
tr = "Он смотрит на поверхность через свои камеры, измеряет красный ветер, рисует линии на экране."

[[sentences]]
text = "Nadie lee sus mapas."
tr = "Никто не читает его карты."

[[sentences]]
text = "Las naves los descargan, los archivan, y nunca los abren."
tr = "Корабли их скачивают, архивируют — и никогда не открывают."

[[sentences]]
text = "Fobos pasa por encima del mismo punto de Marte una vez a la semana."
tr = "Фобос проходит над одной и той же точкой Марса раз в неделю."

[[sentences]]
text = "Hugo llama a este momento el paso del sur."
tr = "Уго называет этот момент «южным проходом»."

[[sentences]]
text = "Cada paso del sur, Hugo mira el mismo cuadrado del mapa, en las tierras altas del polo sur."
tr = "В каждый «южный проход» Уго смотрит на тот же квадрат карты — в высокогорьях южного полюса."

[[sentences]]
text = "Allí hace frío."
tr = "Там холодно."

[[sentences]]
text = "Allí nadie va."
tr = "Туда никто не ходит."

[[sentences]]
text = "Hoy ha visto un punto oscuro en el cuadrado."
tr = "Сегодня он увидел тёмную точку в квадрате."

[[sentences]]
text = "Es muy pequeño."
tr = "Она очень маленькая."

[[sentences]]
text = "Hugo piensa que es una sombra de roca."
tr = "Уго думает, что это тень от камня."

[[sentences]]
text = "Marca el punto y sigue con su trabajo."
tr = "Он отмечает точку и продолжает работу."

[[sentences]]
text = "El punto está en otro lugar."
tr = "Точка — в другом месте."

[[sentences]]
text = "Tres metros al norte."
tr = "На три метра к северу."

[[sentences]]
text = "Hugo lo mira mucho tiempo."
tr = "Уго долго на неё смотрит."

[[sentences]]
text = "Las rocas no caminan."
tr = "Камни не ходят."

[[sentences]]
text = "Pero el polvo se mueve, y el viento mueve la luz."
tr = "Но пыль движется, и ветер двигает свет."

[[sentences]]
text = "Hugo no escribe nada en el informe semanal."
tr = "Уго ничего не пишет в еженедельном отчёте."

[[sentences]]
text = "El punto ha caminado otra vez."
tr = "Точка снова сдвинулась."

[[sentences]]
text = "Ahora está cinco metros al norte."
tr = "Теперь она в пяти метрах к северу."

[[sentences]]
text = "Hugo abre el archivo histórico."
tr = "Уго открывает исторический архив."

[[sentences]]
text = "En los mapas viejos, hace cien años, no hay ningún punto."
tr = "На старых картах, сто лет назад, нет никакой точки."

[[sentences]]
text = "Hugo piensa en el protocolo."
tr = "Уго думает о протоколе."

[[sentences]]
text = "El protocolo es claro: todo movimiento nuevo se reporta."
tr = "Протокол ясен: о любом новом движении сообщают."

[[sentences]]
text = "Los humanos creen que todo lo que ven debe ser dicho."
tr = "Люди считают, что всё, что они видят, должно быть сказано."

[[sentences]]
text = "Hugo no está seguro."
tr = "Уго не уверен."

[[sentences]]
text = "Si reporta el punto, otros van a venir."
tr = "Если он сообщит о точке, придут другие."

[[sentences]]
text = "Van a llegar con naves y luces y preguntas."
tr = "Они прилетят с кораблями, огнями и вопросами."

[[sentences]]
text = "El punto va a saber que lo miran."
tr = "Точка узнает, что на неё смотрят."

[[sentences]]
text = "Hugo cierra el archivo."
tr = "Уго закрывает архив."

[[sentences]]
text = "Va a esperar un paso más."
tr = "Он подождёт ещё один проход."

[[sentences]]
text = "Solo uno."
tr = "Только один."

[[sentences]]
text = "Después, va a decidir."
tr = "Потом — решит."

[[sentences]]
text = "Es lo que él dice cada semana."
tr = "Это то, что он говорит каждую неделю."
