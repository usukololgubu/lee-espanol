*Неправильный.* Спряж.: `sé · sabes · sabe · sabemos · sabéis · saben`. Не путать с возвратной частицей `se` (без ударения).
"""

[words.segura]
tr = "уверенная"
pos = "прил."
lemma = "seguro"

[words.si]
tr = "если"
pos = "союз"
lemma = "si"

[words.sigue]
tr = "(оно) продолжает, остаётся"
pos = "глаг."
lemma = "seguir"
grammar = """
**sigue** — *presente*, 3 л. ед. ч., от **seguir** ("следовать, продолжать").

*Чередование в корне:* `s[[e]]guir → s[[i]]gue` (e → i под ударением). В тексте: `sigue ahí` — "по-прежнему там", `sigue muy alta` — "остаётся очень высоко".
"""

[words.sin]
tr = "без"
pos = "предл."
lemma = "sin"

[words.sobre]
tr = "над, о (теме)"
pos = "предл."
lemma = "sobre"

[words.sola]
tr = "одна (без других)"
pos = "прил."
lemma = "solo"

[words.son]
tr = "(они) есть, являются"
pos = "глаг."
lemma = "ser"
grammar = """
**son** — *presente*, 3 л. мн. ч., от **ser** ("быть").

*Неправильный.* Спряж.: `soy · eres · es · somos · sois · son`. В тексте: `son ocho personas` — "их восемь человек".
"""

[words.sur]
tr = "юг"
pos = "сущ."
lemma = "el sur"

[words.tampoco]
tr = "тоже не"
pos = "нар."
lemma = "tampoco"

[words.tarde]
tr = "поздно"
pos = "нар."
lemma = "tarde"

[words.temporada]
tr = "сезон"
pos = "сущ."
lemma = "la temporada"

[words."titán"]
tr = "Титан — крупнейший спутник Сатурна"
pos = "имя"

[words."todavía"]
tr = "ещё, всё ещё"
pos = "нар."
lemma = "todavía"

[words.todo]
tr = "всё"
pos = "мест."
lemma = "todo"

[words.todos]
tr = "все, каждый"
pos = "опр."
lemma = "todo"

[words.tormentas]
tr = "грозы, бури"
pos = "сущ."
lemma = "la tormenta"

[words.trabaja]
tr = "(она) работает"
pos = "глаг."
lemma = "trabajar"
grammar = """
**trabaja** — *presente*, 3 л. ед. ч., от **trabajar** ("работать").

`trabaj·[[ar]]` → `trabaj·[[a]]`.
"""

[words.una]
tr = "одна / неопр. артикль ж. р."
pos = "арт."
lemma = "una"

[words.va]
tr = "(она) идёт; собирается"
pos = "глаг."
lemma = "ir"
grammar = """
**va** — *presente*, 3 л. ед. ч., от **ir** ("идти, ехать").

*Неправильный.* Спряж.: `voy · vas · va · vamos · vais · van`.

В тексте часто как *futuro próximo*: `va a evacuar`, `va a estar`, `va a mirar`. Структура: `ir` + `a` + инфинитив = "собирается / будет ...".
"""

[words.ven]
tr = "(они) видят"
pos = "глаг."
lemma = "ver"
grammar = """
**ven** — *presente*, 3 л. мн. ч., от **ver** ("видеть").

*Неправильный.* Спряж.: `veo · ves · ve · vemos · veis · ven`.
"""

[words.ventana]
tr = "окно"
pos = "сущ."
lemma = "la ventana"

[words.vez]
tr = "раз"
pos = "сущ."
lemma = "la vez"

[words.viento]
tr = "ветер"
pos = "сущ."
lemma = "el viento"

[words.ya]
tr = "уже"
pos = "нар."
lemma = "ya"


# ───────── sentences (in document order) ─────────

[[sentences]]
text = "Daniela mira el cielo naranja de Titán desde la ventana redonda de la Estación Húygens-4."
tr = "Даниэла смотрит на оранжевое небо Титана из круглого окна Эстасьон Хуйгенс-4."

[[sentences]]
text = "El cielo de Titán nunca cambia mucho."
tr = "Небо Титана никогда сильно не меняется."

[[sentences]]
text = "Hace frío, hace metano, hace lluvia lenta de hidrocarburos."
tr = "Холодно, метаново, медленный дождь из углеводородов."
note = """
О погоде — безличный глагол **hacer**: `hace frío` = «холодно», `hace lluvia` ≈ «идёт дождь».

Подлежащего нет; форма всегда 3 л. ед. ч. (`hace`).
"""

[[sentences]]
text = "Daniela trabaja sola en la estación."
tr = "Даниэла работает на станции одна."

[[sentences]]
text = "Nadie más quiere este puesto."
tr = "Никто больше не хочет этот пост."

[[sentences]]
text = "Es aburrido, dice la gente."
tr = "Скучно, говорят люди."

[[sentences]]
text = "Es preciso, piensa ella."
tr = "Точно, думает она."

[[sentences]]
text = "Pero hace dos años algo nuevo empieza arriba, sobre las dunas del sur."
tr = "Но два года назад наверху, над южными дюнами, начинается что-то новое."

[[sentences]]
text = "Es una nube."
tr = "Это облако."

[[sentences]]
text = "Una nube ancha, baja, que se mueve muy despacio."
tr = "Широкое, низкое облако, которое движется очень медленно."

[[sentences]]
text = "No coincide con ningún modelo."
tr = "Ни с какой моделью не совпадает."

[[sentences]]
text = "Los modelos del clima de Titán existen desde hace cien años."
tr = "Модели погоды Титана существуют уже сто лет."

[[sentences]]
text = "Predicen casi todo: el viento, la lluvia, las tormentas eléctricas."
tr = "Предсказывают почти всё: ветер, дождь, электрические бури."

[[sentences]]
text = "Pero no predicen esto."
tr = "Но это — не предсказывают."

[[sentences]]
text = "Bitácora — Día 487."
tr = "Бортовой журнал — День 487."

[[sentences]]
text = "Imágenes del satélite Argos-2."
tr = "Снимки со спутника Argos-2."

[[sentences]]
text = "La nube avanza 4 km al norte."
tr = "Облако продвигается на 4 км к северу."

[[sentences]]
text = "Forma estable."
tr = "Форма устойчивая."

[[sentences]]
text = "Bitácora — Día 612."
tr = "Бортовой журнал — День 612."

[[sentences]]
text = "La nube ahora cubre el campamento del equipo de perforación."
tr = "Облако теперь покрывает лагерь буровой бригады."

[[sentences]]
text = "Ellos no la ven; sigue muy alta."
tr = "Они её не видят; держится очень высоко."
note = """
**la** — «её» (об облаке, `la nube`, ж. р.): `no la ven` — «не видят её».

`seguir` + прилагательное = «оставаться (каким-то)»: `sigue muy alta` — «держится очень высоко».
"""

[[sentences]]
text = "No envío informe todavía."
tr = "Отчёт пока не отправляю."

[[sentences]]
text = "Abajo, en las dunas, el equipo de perforación trabaja con el metano helado."
tr = "Внизу, на дюнах, буровая бригада работает с замёрзшим метаном."

[[sentences]]
text = "Son ocho personas."
tr = "Их восемь человек."

[[sentences]]
text = "Todos los meses, Daniela habla con ellos por radio."
tr = "Каждый месяц Даниэла говорит с ними по радио."

[[sentences]]
text = "— Húygens-4, aquí Perforación-Sur."
tr = "— Хуйгенс-4, здесь Перфорасьон-Сур."

[[sentences]]
text = "¿Cómo va el clima?"
tr = "Как погода?"

[[sentences]]
text = "— Va bien."
tr = "— Идёт хорошо."

[[sentences]]
text = "Sin cambios."
tr = "Без изменений."

[[sentences]]
text = "Daniela apaga la radio."
tr = "Даниэла выключает радио."

[[sentences]]
text = "Después mira la pantalla."
tr = "Потом смотрит на экран."

[[sentences]]
text = "La nube sigue ahí, ancha, callada, paciente."
tr = "Облако по-прежнему там — широкое, безмолвное, терпеливое."

[[sentences]]
text = "Bitácora — Día 745."
tr = "Бортовой журнал — День 745."

[[sentences]]
text = "La nube ha crecido."
tr = "Облако выросло."

[[sentences]]
text = "No sé qué es."
tr = "Не знаю, что это."

[[sentences]]
text = "Si Daniela escribe el informe ahora, la base va a evacuar al equipo."
tr = "Если Даниэла напишет отчёт сейчас, база эвакуирует бригаду."

[[sentences]]
text = "Pierden la temporada."
tr = "Они теряют сезон."

[[sentences]]
text = "La perforación se cancela."
tr = "Буровые работы отменяются."

[[sentences]]
text = "Si espera otro año, va a estar más segura."
tr = "Если подождёт ещё год, будет более уверена."

[[sentences]]
text = "Pero quizá ya es tarde."
tr = "Но, может быть, уже поздно."

[[sentences]]
text = "Mira la nube."
tr = "Смотрит на облако."

[[sentences]]
text = "La nube no se mueve rápido."
tr = "Облако движется не быстро."

[[sentences]]
text = "Daniela tampoco."
tr = "Даниэла — тоже."
note = """
`tampoco` = «тоже не» (отрицательный аналог `también`). После «La nube no se mueve rápido» → `Daniela tampoco` — «Даниэла тоже (не двигается)».
"""

[[sentences]]
text = "Las dos esperan."
tr = "Обе ждут."

[[sentences]]
text = "Daniela abre el archivo del informe."
tr = "Даниэла открывает файл отчёта."

[[sentences]]
text = "Escribe la fecha."
tr = "Пишет дату."

[[sentences]]
text = "Después cierra el archivo, sin guardar nada."
tr = "Потом закрывает файл, ничего не сохранив."

[[sentences]]
text = "Mañana va a mirar otra vez."
tr = "Завтра ещё раз посмотрит."
