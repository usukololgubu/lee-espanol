tr = "(они) имеют, у них есть"
pos = "глаг."
lemma = "tener"
grammar = """
**tienen** — *presente*, 3 л. мн. ч., от **tener**.

*Чередование:* `t[[e]]ner → t[[ie]]nen` (e → ie). `tienen hambre` = «они голодны».
"""

[words.sigue]
tr = "(она) остаётся, продолжает"
pos = "глаг."
lemma = "seguir"
grammar = """
**sigue** — *presente*, 3 л. ед. ч., от **seguir**.

*Чередование:* `s[[e]]guir → s[[i]]gue` (e → i). `sigue cerrada` = «остаётся закрытой».
"""

[words."todavía"]
tr = "ещё, всё ещё"
pos = "нар."
lemma = "todavía"

[words.se]
tr = "себя (возвратная частица)"
pos = "мест."
lemma = "se"

[words.mueve]
tr = "(она) двигается"
pos = "глаг."
lemma = "moverse"
grammar = """
**se mueve** — *presente* 3 л. ед. ч. от **moverse** (возвратный).

*Чередование:* `m[[o]]ver → m[[ue]]ve` (o → ue). `no se mueve` = «не двигается».
"""

# ---------------------------------------------------------------------------
# [[sentences]] — one per terminator, in story order (35)
# ---------------------------------------------------------------------------

[[sentences]]
text = "Teresa vive sola en la estación de Tritón, en el borde del sistema."
tr = "Тереса живёт одна на станции Тритона, на краю системы."

[[sentences]]
text = "Afuera todo es hielo y noche larga."
tr = "Снаружи всё — лёд и долгая ночь."

[[sentences]]
text = "Adentro hay una puerta gruesa, fría, siempre cerrada."
tr = "Внутри — толстая, холодная, всегда закрытая дверь."

[[sentences]]
text = "Detrás de la puerta está la bóveda."
tr = "За дверью находится хранилище."

[[sentences]]
text = "En la bóveda hay semillas."
tr = "В хранилище есть семена."

[[sentences]]
text = "Miles de semillas de la Tierra, guardadas en tubos pequeños."
tr = "Тысячи семян с Земли, хранящихся в маленьких пробирках."

[[sentences]]
text = "Trigo, maíz, manzanas, flores que Teresa no conoce."
tr = "Пшеница, кукуруза, яблоки, цветы, которых Тереса не знает."

[[sentences]]
text = "El reglamento es claro: la bóveda es un archivo."
tr = "Правило ясное: хранилище — это архив."

[[sentences]]
text = "Nadie la abre."
tr = "Никто его не открывает."

[[sentences]]
text = "Las semillas esperan el regreso."
tr = "Семена ждут возвращения."

[[sentences]]
text = "Pero nadie sabe cuándo va a ser el regreso."
tr = "Но никто не знает, когда будет это возвращение."
note = """
**va a ser** — *futuro próximo*: `ir` + `a` + инфинитив.

`cuándo va a ser` = «когда (это) будет».
"""

[[sentences]]
text = "La Tierra no responde desde hace mucho tiempo."
tr = "Земля не отвечает уже долгое время."
note = """
**desde hace** + время — длительность: «(уже) на протяжении».

`desde hace mucho tiempo` = «уже долгое время».
"""

[[sentences]]
text = "El silencio ya es viejo."
tr = "Молчание уже старое."

[[sentences]]
text = "Esta mañana llegó un mensaje de la colonia vecina, en la luna de al lado."
tr = "Этим утром пришло сообщение от соседней колонии, с соседней луны."

[[sentences]]
text = "Teresa, tenemos hambre."
tr = "Тереса, мы голодны."
note = """
**tener hambre** — «быть голодным» (досл. «иметь голод»).

В испанском состояние часто выражают через **tener**: `tenemos hambre`.
"""

[[sentences]]
text = "La comida sintética ya no alcanza."
tr = "Синтетической еды уже не хватает."

[[sentences]]
text = "Los niños están débiles."
tr = "Дети слабы."

[[sentences]]
text = "Hace falta plantar algo real."
tr = "Нужно посадить что-то настоящее."
note = """
**hace falta** + инфинитив — безличное «нужно (с)делать».
"""

[[sentences]]
text = "Por favor, abre la bóveda."
tr = "Пожалуйста, открой хранилище."

[[sentences]]
text = "Teresa lee el mensaje otra vez."
tr = "Тереса читает сообщение ещё раз."

[[sentences]]
text = "Mira la puerta fría."
tr = "Смотрит на холодную дверь."

[[sentences]]
text = "Piensa en los tubos pequeños, en el trigo dormido."
tr = "Думает о маленьких пробирках, о спящей пшенице."

[[sentences]]
text = "Si abre la bóveda, la gente come."
tr = "Если она откроет хранилище, люди будут есть."
note = """
*Реальное условие (1-й тип):* `si` + *presente*, главная часть тоже в *presente*.

Порядок гибкий: часть с `si` может стоять в начале или в конце.
"""

[[sentences]]
text = "Tal vez crece un campo verde bajo una cúpula."
tr = "Может быть, под куполом вырастет зелёное поле."

[[sentences]]
text = "Tal vez los niños ven una manzana por primera vez."
tr = "Может быть, дети впервые увидят яблоко."

[[sentences]]
text = "Si no la abre, las semillas siguen intactas."
tr = "Если она его не откроет, семена останутся нетронутыми."

[[sentences]]
text = "Esperan un futuro que quizás nunca llega."
tr = "Они ждут будущего, которое, возможно, никогда не наступит."

[[sentences]]
text = "Un futuro de nadie."
tr = "Ничьё будущее."

[[sentences]]
text = "Teresa pone la mano en la puerta."
tr = "Тереса кладёт руку на дверь."

[[sentences]]
text = "El metal está helado."
tr = "Металл ледяной."

[[sentences]]
text = "Adentro hay vida que duerme, como los dormidos de las naves, pero mucho más antigua."
tr = "Внутри есть жизнь, которая спит, как спящие на кораблях, но гораздо более древняя."

[[sentences]]
text = "¿Para quién guarda ella estas semillas?"
tr = "Для кого она хранит эти семена?"

[[sentences]]
text = "¿Para la Tierra que calla, o para los niños que hoy tienen hambre?"
tr = "Для Земли, которая молчит, или для детей, которые сегодня голодны?"

[[sentences]]
text = "La puerta sigue cerrada."
tr = "Дверь остаётся закрытой."

[[sentences]]
text = "Teresa todavía no se mueve."
tr = "Тереса всё ещё не двигается."
