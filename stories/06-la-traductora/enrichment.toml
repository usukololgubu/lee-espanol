[[sentences]]
text = "Inés trabaja en el Instituto de Lenguas, en Marte."
tr = "Инес работает в Институте Языков, на Марсе."

[[sentences]]
text = "Es traductora junior."
tr = "Она младший переводчик."

[[sentences]]
text = "Su trabajo es leer cosas viejas y decir qué dicen."
tr = "Её работа — читать старые вещи и говорить, что они означают."

[[sentences]]
text = "Una mañana llega una caja pequeña."
tr = "Однажды утром приходит маленькая коробка."

[[sentences]]
text = "Dentro hay una placa de metal con símbolos."
tr = "Внутри — металлическая табличка с символами."

[[sentences]]
text = "La placa viene de una nave rota, encontrada en el cinturón de asteroides."
tr = "Табличка прибыла со сломанного корабля, найденного в поясе астероидов."
note = """
Причастия-определения согласуются с существительным: **nave** (ж. р.) → `rota`, `encontrada`.

От глаголов **romper** («сломать») и **encontrar** («найти»).
"""

[[sentences]]
text = "—Lengua extranjera —dice su jefe—."
tr = "— Чужой язык, — говорит её начальник."

[[sentences]]
text = "Probablemente ceremonial."
tr = "Вероятно, церемониальный."

[[sentences]]
text = "Tres semanas, por favor."
tr = "Три недели, пожалуйста."

[[sentences]]
text = "Inés trabaja sola."
tr = "Инес работает одна."

[[sentences]]
text = "Estudia los símbolos cada día."
tr = "Каждый день изучает символы."

[[sentences]]
text = "Bebe café, mira la placa, escribe notas."
tr = "Пьёт кофе, смотрит на табличку, делает заметки."

[[sentences]]
text = "La luz del laboratorio es blanca y fría."
tr = "Свет в лаборатории белый и холодный."

[[sentences]]
text = "Afuera, Marte es rojo y silencioso."
tr = "Снаружи Марс — красный и безмолвный."

[[sentences]]
text = "Después de dos semanas, ella entiende algo."
tr = "Через две недели она кое-что понимает."

[[sentences]]
text = "Los símbolos no son símbolos."
tr = "Символы — не символы."

[[sentences]]
text = "Son letras."
tr = "Это буквы."

[[sentences]]
text = "Letras de una escritura vieja, una forma antigua del español."
tr = "Буквы старого письма, древней формы испанского языка."

[[sentences]]
text = "Esa noche, Inés se queda hasta tarde."
tr = "Той ночью Инес остаётся допоздна."

[[sentences]]
text = "Lee la placa otra vez, lentamente."
tr = "Снова, медленно, читает табличку."

[[sentences]]
text = "«Aquí descansan los hijos de la Colonia Verde.»"
tr = "«Здесь покоятся дети Зелёной Колонии»."

[[sentences]]
text = "Inés mira la pantalla."
tr = "Инес смотрит на экран."

[[sentences]]
text = "Busca «Colonia Verde» en el archivo."
tr = "Ищет «Зелёную Колонию» в архиве."

[[sentences]]
text = "No hay nada."
tr = "Ничего нет."

[[sentences]]
text = "Busca en los registros oficiales de las colonias perdidas."
tr = "Ищет в официальных реестрах утраченных колоний."

[[sentences]]
text = "No hay nada."
tr = "Ничего нет."

[[sentences]]
text = "Busca en los mapas viejos."
tr = "Ищет в старых картах."

[[sentences]]
text = "Nada."
tr = "Ничего."

[[sentences]]
text = "La Colonia Verde no existe."
tr = "Зелёной Колонии не существует."

[[sentences]]
text = "Nunca ha existido."
tr = "Никогда не существовало."
note = """
**ha existido** — *pretérito perfecto* (`haber` + причастие) = «существовало (к настоящему моменту)».

С **nunca** перед глаголом второе отрицание не нужно: `nunca ha existido`.
"""

[[sentences]]
text = "Pero la placa está aquí, en su mesa."
tr = "Но табличка здесь, на её столе."

[[sentences]]
text = "Y los hijos están en alguna parte del cinturón, fríos, sin nombre."
tr = "А дети — где-то в поясе астероидов, холодные, без имени."

[[sentences]]
text = "Mañana, Inés va a escribir su informe."
tr = "Завтра Инес напишет свой отчёт."

[[sentences]]
text = "Puede escribir «origen desconocido»."
tr = "Может написать «происхождение неизвестно»."

[[sentences]]
text = "Es seguro."
tr = "Это безопасно."

[[sentences]]
text = "La placa va a un archivo cerrado."
tr = "Табличка отправится в закрытый архив."

[[sentences]]
text = "Nadie pregunta más."
tr = "Никто больше не спросит."

[[sentences]]
text = "O puede escribir la verdad."
tr = "Или может написать правду."

[[sentences]]
text = "O puede no escribir nada."
tr = "Или может не писать ничего."

[[sentences]]
text = "Otra persona va a encontrar la placa, dentro de muchos años."
tr = "Другой человек найдёт табличку — через много лет."
note = """
`dentro de` + время = «через»: `dentro de muchos años` — «через много лет».

Сравни: `hace …` = «… назад» (в прошлом), `dentro de …` = «через …» (в будущем).
"""

[[sentences]]
text = "Tal vez."
tr = "Возможно."

[[sentences]]
text = "Inés apaga la luz."
tr = "Инес гасит свет."

[[sentences]]
text = "La placa brilla un poco, en la oscuridad."
tr = "Табличка чуть-чуть светится в темноте."
