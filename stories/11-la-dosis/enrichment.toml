# Story 11 — "La dosis" — enrichment for renderer popups
# 45 sentences, 10 paragraphs (plus a separator line and a lab-readings block).

# ──────── Proper nouns (no lemma → no SpanishDict link) ────────

[words.ana]
tr = "Ана — имя главной героини, врача станции"
pos = "имя"

[words.soto]
tr = "Сото — фамилия Аны"
pos = "имя"

[words.argyre]
tr = "Аргиры — название станции; от Argyre Planitia (равнина в южном полушарии Марса)"
pos = "имя"

[words.marte]
tr = "Марс — планета"
pos = "имя"

[words.tierra]
tr = "Земля — планета (в тексте всегда с большой буквы и арт. **la**)"
pos = "имя"

# ──────── Articles / determiners / pronouns ────────

[words.la]
tr = "(арт. ж. р., ед. ч.); её (объектное)"
pos = "арт."
lemma = "la"
grammar = """
**la** — в большинстве случаев *определённый артикль* ж. р. ед. ч.: `[[la]] estación`.

Но дважды в тексте — *безударное объектное местоимение* ("её"):

`Una idea pequeña [[la]] inquieta` = "Маленькая мысль её тревожит".

`[[La]] fabricaron en la Tierra` = "Её (= таблетку) изготовили на Земле".
"""

[words.el]
tr = "(арт. м. р., ед. ч.)"
pos = "арт."
lemma = "el"

[words.los]
tr = "(арт. м. р., мн. ч.)"
pos = "арт."
lemma = "los"

[words.las]
tr = "(арт. ж. р., мн. ч.)"
pos = "арт."
lemma = "las"

[words.un]
tr = "один; (неопр. арт. м. р.)"
pos = "арт."
lemma = "un"

[words.una]
tr = "одна; (неопр. арт. ж. р.)"
pos = "арт."
lemma = "un"

[words.esta]
tr = "эта"
pos = "мест."
lemma = "este"
grammar = """
**esta** — указательное местоимение ж. р. ед. ч. от **este**.

`[[esta]] semana` ("на этой неделе"), `[[esta]] radiación` ("эта радиация").
"""

[words.cada]
tr = "каждый"
pos = "прил."
lemma = "cada"
grammar = """
**cada** — не меняется по роду: `[[cada]] mes`, `[[cada]] año`, `[[cada]] mañana`.
"""

[words.lo]
tr = "его; это (объектное)"
pos = "мест."
lemma = "lo"
grammar = """
**lo** — безударное объектное местоимение м. р. ед. ч. ("его / это").

`[[Lo]] borra` = "Стирает его (= сообщение)". `[[Lo]] guarda` = "Сохраняет его".
"""

[words.nadie]
tr = "никто"
pos = "мест."
lemma = "nadie"
grammar = """
**nadie** — "никто". Часто с двойным отрицанием, но здесь стоит первым, поэтому **no** не нужен: `[[Nadie]] está enfermo`.
"""

[words.se]
tr = "себя; (возвр. частица)"
pos = "мест."
lemma = "se"
grammar = """
**se** — возвратное местоимение 3 л.

В тексте: `[[se]] queja` — обязательная частица возвратного глагола **quejarse** ("жаловаться").
"""

[words.todo]
tr = "всё"
pos = "мест."
lemma = "todo"
grammar = """
**todo** — м. р. ед. ч. от **todo** ("весь; всё").

`[[Todo]] termina` = "Всё заканчивается".
"""

# ──────── Prepositions / conjunctions ────────

[words.de]
tr = "из; от; о"
pos = "предл."
lemma = "de"

[words.del]
tr = "из / от + (м. р. ед. ч.)"
pos = "предл."
lemma = "del"
grammar = """
**del** — слияние `de + el`.

`de + [[el]]` → `[[del]]`. Артикль **el** не пишется отдельно.

В тексте: `[[del]] límite seguro` ("безопасного предела").
"""

[words.en]
tr = "в; на"
pos = "предл."
lemma = "en"

[words.a]
tr = "к; в; (a personal)"
pos = "предл."
lemma = "a"
grammar = """
**a** — здесь часто часть *futuro próximo* (**va a tener** "будет иметь") и как *a personal* перед одушевлёнными объектами:

`informa [[a]] la Tierra` = "сообщает Земле".
"""

[words.con]
tr = "с"
pos = "предл."
lemma = "con"

[words.por]
tr = "по; через"
pos = "предл."
lemma = "por"
grammar = """
**por** — здесь "через": `entra [[por]] la ventana` = "входит через окно".
"""

[words.desde]
tr = "с; начиная с"
pos = "предл."
lemma = "desde"
grammar = """
**desde** + время = "(начиная) с".

`[[desde]] hace tiempo` = "уже давно" (буквально: "с тех пор, как делает (некоторое) время").
"""

[words.sobre]
tr = "на; над"
pos = "предл."
lemma = "sobre"

[words.que]
tr = "что; который"
pos = "союз"
lemma = "que"
grammar = """
**que** — вводит подчинённое предложение после **dicen**:

`los archivos dicen [[que]] la mitad de la estación va a tener problemas`.
"""

[words.si]
tr = "если"
pos = "союз"
lemma = "si"
grammar = """
**si** — "если". С *presente* в условии: `[[si]] Ana informa` ("если Ана сообщит") — A1.
"""

[words.pero]
tr = "но"
pos = "союз"
lemma = "pero"

# ──────── Adverbs ────────

[words.no]
tr = "не; нет"
pos = "нар."
lemma = "no"

[words."aquí"]
tr = "здесь"
pos = "нар."
lemma = "aquí"

[words.bien]
tr = "хорошо"
pos = "нар."
lemma = "bien"
grammar = """
**bien** — наречие "хорошо". `no funciona [[bien]]` = "работает плохо" (букв. "не работает хорошо").
"""

[words.poco]
tr = "немного; чуть-чуть"
pos = "нар."
lemma = "poco"
grammar = """
**poco** — здесь наречие, "чуть-чуть": `brilla un [[poco]]` = "немного блестит".
"""

[words.despacio]
tr = "медленно"
pos = "нар."
lemma = "despacio"

[words."quizás"]
tr = "может быть"
pos = "нар."
lemma = "quizás"
grammar = """
**quizás** — "возможно, может быть". На уровне A1 — с *presente* (без *subjuntivo*).
"""

[words.afuera]
tr = "снаружи"
pos = "нар."
lemma = "afuera"

[words.hace]
tr = "(тому) назад; делает"
pos = "глаг."
lemma = "hacer"
grammar = """
**hace** + время = идиома "… назад".

`[[hace]] veinte años` = "двадцать лет назад".

`desde [[hace]] tiempo` = "уже давно" (постоянное действие, начавшееся в прошлом).

*Дословно:* "(оно) делает 20 лет".
"""

# ──────── Numerals ────────

[words.cuarenta]
tr = "сорок"
pos = "числ."
lemma = "cuarenta"

[words.doce]
tr = "двенадцать"
pos = "числ."
lemma = "doce"

[words.veinte]
tr = "двадцать"
pos = "числ."
lemma = "veinte"

[words.tres]
tr = "три"
pos = "числ."
lemma = "tres"

[words.dos]
tr = "два"
pos = "числ."
lemma = "dos"

[words.diez]
tr = "десять"
pos = "числ."
lemma = "diez"

[words.cinco]
tr = "пять"
pos = "числ."
lemma = "cinco"

# ──────── Verbs (conjugated forms and infinitives) ────────

[words.es]
tr = "(он/она) есть"
pos = "глаг."
lemma = "ser"
grammar = """
**es** — *presente*, 3 л. ед. ч., от **ser** ("быть" — постоянные свойства).

`Ana [[es]] la única médica` ("Ана — единственный врач").
"""

[words.son]
tr = "(они) есть"
pos = "глаг."
lemma = "ser"
grammar = """
**son** — *presente*, 3 л. мн. ч., от **ser**.

Спряж.: `soy · eres · es · somos · sois · son`.
"""

[words."está"]
tr = "(он/она) находится"
pos = "глаг."
lemma = "estar"
grammar = """
**está** — *presente*, 3 л. ед. ч., от **estar** ("быть, находиться (в состоянии)").

`Nadie [[está]] enfermo` = "Никто не болен" — *estar* для временных состояний.
"""

[words.trabajan]
tr = "(они) работают"
pos = "глаг."
lemma = "trabajar"
grammar = """
**trabajan** — *presente*, 3 л. мн. ч., от **trabajar** ("работать"). Правильный на `-ar`.

`trabaj·[[ar]]` → `trabaj·[[an]]`.
"""

[words.lleva]
tr = "(она) несёт; (есть) уже …"
pos = "глаг."
lemma = "llevar"
grammar = """
**lleva** — *presente*, 3 л. ед. ч., от **llevar**.

Идиома `llevar + время + прич./прил.` = "уже … (столько-то времени)":

`la estación [[lleva]] doce años abierta` = "станция открыта уже двенадцать лет".
"""

[words.revisa]
tr = "(она) проверяет"
pos = "глаг."
lemma = "revisar"
grammar = """
**revisa** — *presente*, 3 л. ед. ч., от **revisar** ("проверять"). Правильный на `-ar`.
"""

[words.prepara]
tr = "(она) готовит"
pos = "глаг."
lemma = "preparar"
grammar = """
**prepara** — *presente*, 3 л. ед. ч., от **preparar** ("готовить"). Правильный на `-ar`.
"""

[words.abre]
tr = "(она) открывает"
pos = "глаг."
lemma = "abrir"
grammar = """
**abre** — *presente*, 3 л. ед. ч., от **abrir** ("открывать").

`abr·[[ir]]` → `abr·[[e]]` (правильный на `-ir`).
"""

[words.inquieta]
tr = "(он/она) тревожит"
pos = "глаг."
lemma = "inquietar"
grammar = """
**inquieta** — *presente*, 3 л. ед. ч., от **inquietar** ("тревожить, беспокоить"). Правильный на `-ar`.

`Una idea ... [[la]] [[inquieta]]` = "Мысль её тревожит".
"""

[words.quiere]
tr = "(она) хочет"
pos = "глаг."
lemma = "querer"
grammar = """
**quiere** — *presente*, 3 л. ед. ч., от **querer** ("хотеть").

*Чередование:* `qu[[e]]rer → qu[[ie]]re` (e → ie).

Спряж.: `quiero · quieres · quiere · queremos · queréis · quieren`.
"""

[words.comparar]
tr = "сравнивать"
pos = "глаг."
lemma = "comparar"
grammar = """
**comparar** — инфинитив "сравнивать".

После **quiere** инфинитив без предлога: `[[quiere]] [[comparar]]` ("хочет сравнить").
"""

[words.aparecen]
tr = "(они) появляются"
pos = "глаг."
lemma = "aparecer"
grammar = """
**aparecen** — *presente*, 3 л. мн. ч., от **aparecer** ("появляться").

Правильный на `-er`: `aparec·[[er]]` → `aparec·[[en]]`.
"""

[words.fabricaron]
tr = "(они) изготовили"
pos = "глаг."
lemma = "fabricar"
grammar = """
**fabricaron** — *pretérito indefinido*, 3 л. мн. ч., от **fabricar** ("изготавливать").

`fabric·[[ar]]` → `fabric·[[aron]]`.

Безличное "они" (по смыслу — на Земле): `[[La]] [[fabricaron]] en la Tierra` = "Её изготовили на Земле".
"""

[words.funciona]
tr = "(он/она) работает (о технике)"
pos = "глаг."
lemma = "funcionar"
grammar = """
**funciona** — *presente*, 3 л. ед. ч., от **funcionar** ("функционировать, работать (о механизмах, лекарствах)"). Правильный на `-ar`.

Не путать с **trabajar** (работать о человеке).
"""

[words.mira]
tr = "(она) смотрит"
pos = "глаг."
lemma = "mirar"
grammar = """
**mira** — *presente*, 3 л. ед. ч., от **mirar** ("смотреть").
"""

[words.tose]
tr = "(он/она) кашляет"
pos = "глаг."
lemma = "toser"
grammar = """
**tose** — *presente*, 3 л. ед. ч., от **toser** ("кашлять"). Правильный на `-er`.
"""

[words.queja]
tr = "(он/она) жалуется"
pos = "глаг."
lemma = "quejarse"
grammar = """
**se queja** — *presente* возвратного **quejarse** ("жаловаться"), 3 л. ед. ч.

Частица **se** обязательна.
"""

[words.dicen]
tr = "(они) говорят"
pos = "глаг."
lemma = "decir"
grammar = """
**dicen** — *presente*, 3 л. мн. ч., от **decir** ("говорить").

Неправильный. Спряж.: `digo · dices · dice · decimos · decís · dicen`.

`los archivos [[dicen]]` ("файлы говорят" — переносное "говорят").
"""

[words.va]
tr = "(он/она) идёт; собирается"
pos = "глаг."
lemma = "ir"
grammar = """
**va** — *presente*, 3 л. ед. ч., от **ir** ("идти").

Здесь — часть *futuro próximo*: **va a tener** ("будет иметь").

Структура: `[[ir]]` + `a` + инфинитив.
"""

[words.tener]
tr = "иметь"
pos = "глаг."
lemma = "tener"
grammar = """
**tener** — инфинитив "иметь". Часть *futuro próximo* **va a tener** ("будут проблемы").
"""

[words.informa]
tr = "(он/она) сообщает"
pos = "глаг."
lemma = "informar"
grammar = """
**informa** — *presente*, 3 л. ед. ч., от **informar** ("сообщать, информировать"). Правильный на `-ar`.

`informar [[a]] alguien` = "сообщать кому-л.".
"""

[words.llega]
tr = "(он/она) приходит"
pos = "глаг."
lemma = "llegar"
grammar = """
**llega** — *presente*, 3 л. ед. ч., от **llegar** ("прибывать, приходить"). Правильный на `-ar`.
"""

[words.cierra]
tr = "(она) закрывается"
pos = "глаг."
lemma = "cerrar"
grammar = """
**cierra** — *presente*, 3 л. ед. ч., от **cerrar** ("закрывать(ся)").

*Чередование:* `c[[e]]rrar → c[[ie]]rra` (e → ie).
"""

[words.termina]
tr = "(он/она) заканчивается"
pos = "глаг."
lemma = "terminar"
grammar = """
**termina** — *presente*, 3 л. ед. ч., от **terminar** ("заканчиваться"). Правильный на `-ar`.
"""

[words.sigue]
tr = "(он/она) продолжает"
pos = "глаг."
lemma = "seguir"
grammar = """
**sigue** — *presente*, 3 л. ед. ч., от **seguir** ("продолжать").

*Чередование:* `s[[e]]guir → s[[i]]gue` (e → i).

Идиома `seguir + герундий` = "продолжать (делать что-л.)": `[[sigue]] [[tomando]]` ("продолжает принимать").
"""

[words.tomando]
tr = "принимая; принимающий"
pos = "глаг."
lemma = "tomar"
grammar = """
**tomando** — *герундий* от **tomar** ("брать; принимать (лекарство)"): `tom·[[ar]]` → `tom·[[ando]]`.

Используется в обороте `seguir + герундий` = "продолжать делать": `sigue [[tomando]]`.
"""

[words."confía"]
tr = "(он/она) доверяет"
pos = "глаг."
lemma = "confiar"
grammar = """
**confía** — *presente*, 3 л. ед. ч., от **confiar** ("доверять").

Графическое ударение на `í` сохраняет слог: `conf·í·a`.

Подразумевается субъект: `(la gente) [[confía]]` = "(люди) доверяют".
"""

[words.bebe]
tr = "(он/она) пьёт"
pos = "глаг."
lemma = "beber"
grammar = """
**bebe** — *presente*, 3 л. ед. ч., от **beber** ("пить"). Правильный на `-er`.
"""

[words.cuida]
tr = "(он/она) ухаживает"
pos = "глаг."
lemma = "cuidar"
grammar = """
**cuida** — *presente*, 3 л. ед. ч., от **cuidar** ("заботиться, ухаживать"). Правильный на `-ar`.

`cuidar [[los]] invernaderos` = "ухаживать за теплицами".
"""

[words."sueña"]
tr = "(он/она) мечтает; видит сны"
pos = "глаг."
lemma = "soñar"
grammar = """
**sueña** — *presente*, 3 л. ед. ч., от **soñar** ("мечтать; видеть сны").

*Чередование:* `s[[o]]ñar → s[[ue]]ña` (o → ue).

`soñar [[con]]` + сущ. = "мечтать о (чём-л.)".
"""

[words.escribe]
tr = "(она) пишет"
pos = "глаг."
lemma = "escribir"
grammar = """
**escribe** — *presente*, 3 л. ед. ч., от **escribir** ("писать"). Правильный на `-ir`.
"""

[words.borra]
tr = "(она) стирает"
pos = "глаг."
lemma = "borrar"
grammar = """
**borra** — *presente*, 3 л. ед. ч., от **borrar** ("стирать, удалять (файл, текст)"). Правильный на `-ar`.
"""

[words.guarda]
tr = "(она) сохраняет"
pos = "глаг."
lemma = "guardar"
grammar = """
**guarda** — *presente*, 3 л. ед. ч., от **guardar** ("хранить; сохранять (файл)").
"""

[words.sube]
tr = "(он/она) поднимается"
pos = "глаг."
lemma = "subir"
grammar = """
**sube** — *presente*, 3 л. ед. ч., от **subir** ("подниматься"). Правильный на `-ir`.
"""

[words.entra]
tr = "(он/она) входит"
pos = "глаг."
lemma = "entrar"
grammar = """
**entra** — *presente*, 3 л. ед. ч., от **entrar** ("входить"). Правильный на `-ar`.

`entrar [[por]]` = "входить через".
"""

[words.brilla]
tr = "(он/она) блестит"
pos = "глаг."
lemma = "brillar"
grammar = """
**brilla** — *presente*, 3 л. ед. ч., от **brillar** ("блестеть, сиять"). Правильный на `-ar`.
"""

# ──────── Nouns and adjectives ────────

[words.doctora]
tr = "врач (ж.)"
pos = "сущ."
lemma = "la doctora"
grammar = """
**la doctora** — врач женского пола; муж. форма — **el doctor**.

В Латинской Америке к врачу часто обращаются `doctor / doctora`, без сокращения `Dr.` / `Dra.`.
"""

[words."única"]
tr = "единственная"
pos = "прил."
lemma = "único"
grammar = """
**única** — ж. р. ед. ч. от **único** ("единственный").

`la [[única]] médica` ("единственный врач (ж.)").
"""

[words."médica"]
tr = "врач (ж.); медицинская"
pos = "сущ. / прил."
lemma = "la médica"
grammar = """
**médica** — здесь сущ. ж. р., "врач (женщина)". Муж. форма — **el médico**.

Как прил. ("медицинская") согласуется с сущ.: `el archivo [[médico]]` (м.), `la consulta [[médica]]` (ж.).
"""

[words."estación"]
tr = "станция"
pos = "сущ."
lemma = "la estación"
grammar = """
**la estación** — "станция". Род женский, ед. число.

В мн. ч.: `estaciones` (без ударения, ударение естественное).
"""

[words."pequeño"]
tr = "маленький"
pos = "прил."
lemma = "pequeño"

[words."pequeña"]
tr = "маленькая"
pos = "прил."
lemma = "pequeño"
grammar = """
**pequeña** — ж. р. ед. ч. от **pequeño**.
"""

[words.puesto]
tr = "пост; пункт"
pos = "сущ."
lemma = "el puesto"
grammar = """
**el puesto** — "пост, пункт (наблюдения, торговый и т. п.)". Род мужской.

`un pequeño [[puesto]] de terraformación` = "маленький терраформирующий пост".
"""

[words."terraformación"]
tr = "терраформирование"
pos = "сущ."
lemma = "la terraformación"
grammar = """
**la terraformación** — "терраформирование": изменение планеты под земные условия. Род женский (как все на `-ción`).
"""

[words.sur]
tr = "юг"
pos = "сущ."
lemma = "el sur"
grammar = """
**el sur** — "юг". Род мужской.

`en el [[sur]] de Marte` = "на юге Марса".
"""

[words.personas]
tr = "люди; человек (мн. ч.)"
pos = "сущ."
lemma = "la persona"
grammar = """
**personas** — мн. ч. от **la persona** ("человек; лицо"). Род всегда женский, даже о мужчинах.
