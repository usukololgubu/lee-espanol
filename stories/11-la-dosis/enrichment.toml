[[sentences]]
text = "La doctora Ana Soto es la única médica de la Estación Argyre, un pequeño puesto de terraformación en el sur de Marte."
tr = "Доктор Ана Сото — единственный врач Станции Аргиры, маленького терраформирующего поста на юге Марса."

[[sentences]]
text = "Aquí trabajan cuarenta personas."
tr = "Здесь работают сорок человек."

[[sentences]]
text = "La estación lleva doce años abierta."
tr = "Станция открыта уже двенадцать лет."

[[sentences]]
text = "Cada mes, Ana hace los exámenes."
tr = "Каждый месяц Ана проводит осмотры."

[[sentences]]
text = "Cada año, revisa las dosis de radiación."
tr = "Каждый год проверяет дозы радиации."

[[sentences]]
text = "Cada mañana, prepara la profilaxis estándar: una píldora azul, fácil, antigua."
tr = "Каждое утро готовит стандартную профилактику — синюю таблетку: простую, давнюю."

[[sentences]]
text = "Esta semana, Ana abre los archivos viejos."
tr = "На этой неделе Ана открывает старые архивы."

[[sentences]]
text = "Una idea pequeña la inquieta."
tr = "Маленькая мысль её тревожит."

[[sentences]]
text = "Quiere comparar la dosis recibida con la dosis efectiva en el cuerpo."
tr = "Она хочет сравнить полученную дозу с эффективной дозой в организме."

[[sentences]]
text = "Cuarenta personas, doce años."
tr = "Сорок человек, двенадцать лет."

[[sentences]]
text = "Los números aparecen lentos."
tr = "Числа появляются медленно."

[[sentences]]
text = "Ana revisa la fórmula de la píldora azul."
tr = "Ана пересматривает формулу синей таблетки."

[[sentences]]
text = "La fabricaron en la Tierra hace veinte años."
tr = "Её изготовили на Земле двадцать лет назад."

[[sentences]]
text = "En Marte, con esta radiación, no funciona bien."
tr = "На Марсе, при такой радиации, она работает плохо."

[[sentences]]
text = "No funciona desde hace tiempo."
tr = "Уже давно работает плохо."

[[sentences]]
text = "Ana mira la pantalla."
tr = "Ана смотрит на экран."

[[sentences]]
text = "Nadie está enfermo."
tr = "Никто не болен."

[[sentences]]
text = "Nadie tose."
tr = "Никто не кашляет."

[[sentences]]
text = "Nadie se queja."
tr = "Никто не жалуется."

[[sentences]]
text = "Los exámenes mensuales son normales."
tr = "Ежемесячные осмотры в норме."

[[sentences]]
text = "Pero los archivos dicen que la mitad de la estación va a tener problemas en diez años."
tr = "Но архивы говорят, что у половины станции через десять лет начнутся проблемы."

[[sentences]]
text = "Quizás cinco."
tr = "Может быть, через пять."

[[sentences]]
text = "Quizás veinte."
tr = "Может быть, через двадцать."

[[sentences]]
text = "Los números no son seguros."
tr = "Числа ненадёжны."

[[sentences]]
text = "Si Ana informa a la Tierra, mañana llega la orden: evacuación inmediata."
tr = "Если Ана сообщит Земле, завтра придёт приказ: немедленная эвакуация."

[[sentences]]
text = "La estación cierra."
tr = "Станция закрывается."

[[sentences]]
text = "Doce años de trabajo."
tr = "Двенадцать лет работы."

[[sentences]]
text = "Tres niños nacidos aquí."
tr = "Трое детей, родившихся здесь."

[[sentences]]
text = "Dos tumbas."
tr = "Две могилы."

[[sentences]]
text = "Todo termina."
tr = "Всё заканчивается."

[[sentences]]
text = "Si Ana no informa, la gente sigue tomando la píldora azul."
tr = "Если Ана не сообщит, люди продолжают принимать синюю таблетку."

[[sentences]]
text = "Confía."
tr = "Доверяет."

[[sentences]]
text = "Bebe café."
tr = "Пьёт кофе."

[[sentences]]
text = "Cuida los invernaderos."
tr = "Ухаживает за теплицами."

[[sentences]]
text = "Sueña con árboles."
tr = "Мечтает о деревьях."

[[sentences]]
text = "Ana abre un mensaje nuevo."
tr = "Ана открывает новое сообщение."

[[sentences]]
text = "Escribe: «Tierra, informe urgente —»."
tr = "Пишет: «Земля, срочный доклад —»."

[[sentences]]
text = "Lo borra."
tr = "Стирает."

[[sentences]]
text = "Escribe: «Tierra, consulta técnica —»."
tr = "Пишет: «Земля, технический запрос —»."

[[sentences]]
text = "Lo borra."
tr = "Стирает."

[[sentences]]
text = "Escribe: «Tierra, —»."
tr = "Пишет: «Земля, —»."

[[sentences]]
text = "Lo guarda en borradores."
tr = "Сохраняет в черновиках."

[[sentences]]
text = "Afuera, el sol marciano sube despacio."
tr = "Снаружи марсианское солнце поднимается медленно."

[[sentences]]
text = "La luz roja entra por la ventana."
tr = "Красный свет входит через окно."

[[sentences]]
text = "La píldora azul brilla un poco, sobre la mesa."
tr = "Синяя таблетка чуть-чуть блестит на столе."
