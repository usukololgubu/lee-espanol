grammar = """
**tengo que + инфинитив** — конструкция "должен / надо сделать что-то".

`Tengo que dormirla otra vez` = "Я должен снова её усыпить".
"""

[words."tiempo"]
tr = "время"
pos = "сущ."
lemma = "el tiempo"

[words."tiene"]
tr = "(он/она) имеет"
pos = "глаг."
lemma = "tener"

[words."todavía"]
tr = "ещё, всё ещё"
pos = "нар."
lemma = "todavía"

[words."toda"]
tr = "вся, целая"
pos = "опр."
lemma = "todo"

[words."tomás"]
tr = "Tomás — имя инженера"
pos = "имя"

[words."tomo"]
tr = "(я) пью / беру"
pos = "глаг."
lemma = "tomar"
grammar = """
**tomo** — *presente*, 1 л. ед. ч., от **tomar** ("брать; пить").

В Лат. Америке `tomar` для напитков = "пить": `tomo agua` = "пью воду".
"""

[words."tres"]
tr = "три"
pos = "числ."

[words."un"]
tr = "неопр. артикль м. р."
pos = "арт."
lemma = "un"

[words."una"]
tr = "неопр. артикль ж. р. / одна"
pos = "арт."
lemma = "una"

[words."va"]
tr = "(она) идёт; собирается"
pos = "глаг."
lemma = "ir"
grammar = """
**no va a recordar** — *futuro próximo* в отрицании.

Структура: `ir` (в наст.) + `a` + инфинитив. `va a recordar` = "будет помнить". `no va a recordar nada` = "ничего не будет помнить".
"""

[words."vamos"]
tr = "(мы) идём"
pos = "глаг."
lemma = "ir"
grammar = """
**vamos** — *presente*, 1 л. мн. ч., от **ir** ("идти").

Спряж.: `voy · vas · va · vamos · vais · van`. `Vamos a Próxima Centauri` = "Мы идём (летим) к Проксима Центавра".
"""

[words."veinticuatro"]
tr = "двадцать четыре"
pos = "числ."

[words."ver"]
tr = "видеть"
pos = "глаг."
lemma = "ver"

[words."vez"]
tr = "раз"
pos = "сущ."
lemma = "la vez"
grammar = """
**otra vez** — устойчивое выражение "снова, ещё раз". Также: `una vez` ("однажды"), `dos veces` ("дважды").
"""

[words."viaje"]
tr = "путешествие, рейс"
pos = "сущ."
lemma = "el viaje"

[words."vida"]
tr = "жизнь"
pos = "сущ."
lemma = "la vida"

[words."vivo"]
tr = "(я) живу"
pos = "глаг."
lemma = "vivir"
grammar = """
**vivo** — *presente*, 1 л. ед. ч., от **vivir** ("жить").

Правильный на `-ir`: `viv·[[ir]]` → `viv·[[o]]`.
"""

[words."voy"]
tr = "(я) иду; собираюсь"
pos = "глаг."
lemma = "ir"
grammar = """
**voy a + инфинитив** — *futuro próximo*: "собираюсь / буду делать X".

`voy a dormirla` = "я её усыплю / собираюсь её усыпить".
"""

[words."vuelvo"]
tr = "(я) возвращаюсь"
pos = "глаг."
lemma = "volver"
grammar = """
**vuelvo** — *presente*, 1 л. ед. ч., от **volver** ("возвращаться").

*Чередование в корне:* `v[[o]]lver → v[[ue]]lvo` (o → ue). Спряж.: `vuelvo · vuelves · vuelve · volvemos · volvéis · vuelven`.

`vuelvo a + инфинитив` = "снова делаю X": `vuelvo a dormir` = "снова засыпаю".
"""

[words."y"]
tr = "и"
pos = "союз"
lemma = "y"

[words."ya"]
tr = "уже"
pos = "нар."
lemma = "ya"

[words."yo"]
tr = "я"
pos = "мест."
lemma = "yo"

